<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自陣キャラ図鑑</title>

  <style>
    :root {
      --page-bg: #f7f7f8;
      --panel-bg: #ffffff;
      --text-main: #222222;
      --text-sub: #666666;
      --text-muted: #8a8a8a;
      --line: #dddddf;
      --soft-line: #ececef;
      --input-bg: #ffffff;
      --button-dark: #222222;
      --button-light: #f1f1f3;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
    }

    header {
      padding: 34px 20px 24px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    header h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0.04em;
      color: var(--text-main);
    }

    header p {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
      color: var(--text-main);
    }

    .note {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.7;
    }

    .reload-button,
    .secondary-button,
    .title-edit-button,
    .compare-link {
      background: var(--button-light);
      color: var(--text-main);
      border: 1px solid var(--line);
      font-size: 13px;
      padding: 9px 14px;
      margin-top: 0;
      border-radius: 999px;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .character-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      --character-color: #999999;
      background: #ffffff;
      border: 1px solid var(--line);
      border-left: 8px solid var(--character-color);
      border-radius: 18px;
      padding: 16px;
      transition: 0.15s;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.07);
    }

    .card-top {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .avatar,
    .avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--character-color);
      border: 1px solid rgba(0,0,0,0.12);
      flex: 0 0 auto;
      overflow: hidden;
    }

    .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .avatar-placeholder {
      display: grid;
      place-items: center;
      font-size: 30px;
    }

    .name {
      font-size: 19px;
      font-weight: bold;
      color: var(--text-main);
    }

    .furigana {
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .sub {
      margin-top: 10px;
      color: var(--text-sub);
      font-size: 13px;
      line-height: 1.6;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-sub);
      font-size: 12px;
      background: #f6f6f7;
      border: 1px solid var(--soft-line);
      border-radius: 999px;
      padding: 5px 8px;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--character-color);
      border: 1px solid rgba(0,0,0,0.2);
    }

    .chip-emoji {
      font-size: 15px;
      line-height: 1;
    }

    .empty {
      color: var(--text-muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .add-panel summary,
    .form-group summary {
      cursor: pointer;
      font-weight: bold;
      list-style: none;
    }

    .add-panel summary {
      font-size: 18px;
    }

    .add-panel summary::-webkit-details-marker,
    .form-group summary::-webkit-details-marker {
      display: none;
    }

    .form-content {
      margin-top: 18px;
    }

    .form-actions-top {
      display: none;
      background: #f6f6f7;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      color: var(--text-main);
      font-size: 14px;
    }

    .form-actions-top.active {
      display: block;
    }

    .form-group {
      background: #fafafa;
      border: 1px solid var(--soft-line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .form-group summary {
      font-size: 16px;
      color: var(--text-main);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .form-item.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.5;
    }

    input,
    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 15px;
    }

    input[type="file"] {
      padding: 10px;
      background: var(--input-bg);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    .image-upload-box {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      align-items: center;
    }

    .image-preview {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      background: #4682b4;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
      font-size: 32px;
      color: #fff;
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .image-help {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .color-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
      align-items: center;
    }

    .birthday-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input[type="color"] {
      height: 46px;
      padding: 5px;
      cursor: pointer;
    }

    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: var(--button-dark);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.86;
    }

    #message,
    #questionMessage {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    dialog {
      width: min(940px, calc(100% - 28px));
      max-height: 86vh;
      overflow: auto;
      background: #ffffff;
      color: var(--text-main);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 0;
      box-shadow: 0 20px 80px rgba(0,0,0,0.2);
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.35);
    }

    .modal-header {
      --character-color: #999999;
      padding: 24px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .modal-header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .modal-avatar,
    .modal-avatar-placeholder {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      background: var(--character-color);
      border: 1px solid rgba(0,0,0,0.12);
      flex: 0 0 auto;
      overflow: hidden;
    }

    .modal-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .modal-avatar-placeholder {
      display: grid;
      place-items: center;
      font-size: 38px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 28px;
      color: var(--text-main);
    }

    .modal-header p {
      margin: 6px 0 0;
      color: var(--text-sub);
    }

    .modal-body {
      padding: 20px;
    }

    .detail-section {
      margin-bottom: 22px;
    }

    .detail-section h3 {
      margin: 0 0 10px;
      font-size: 17px;
      color: var(--text-main);
      border-bottom: 1px solid var(--soft-line);
      padding-bottom: 8px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-item {
      background: #fafafa;
      border: 1px solid var(--soft-line);
      border-radius: 12px;
      padding: 12px;
    }

    .detail-label {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .detail-value {
      margin-top: 5px;
      color: var(--text-main);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-footer {
      padding: 0 20px 20px;
      text-align: right;
    }

    .close-button {
      background: var(--button-light);
      color: var(--text-main);
      border: 1px solid var(--line);
    }

    .edit-button {
      margin-right: 8px;
    }

    .settings-form {
      padding: 20px;
    }

    .settings-form h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .settings-actions {
      text-align: right;
      margin-top: 14px;
    }

    .stat-group {
      margin-top: 18px;
      border-top: 1px solid var(--soft-line);
      padding-top: 16px;
    }

    .stat-group h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--text-main);
    }

    .stat-note {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.7;
      margin-top: 6px;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 24px;
      }

      .header-inner {
        display: block;
      }

      .header-buttons {
        margin-top: 14px;
      }

      main {
        padding: 14px;
      }

      .panel {
        padding: 16px;
        border-radius: 16px;
      }

      .section-title {
        display: block;
      }

      .reload-button {
        margin-top: 12px;
      }

      .character-list {
        grid-template-columns: 1fr;
      }

      .form-grid,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .color-row {
        grid-template-columns: 70px 1fr;
      }

      .image-upload-box {
        grid-template-columns: 1fr;
      }

      .modal-header-inner {
        align-items: flex-start;
      }

      .modal-avatar,
      .modal-avatar-placeholder {
        width: 72px;
        height: 72px;
      }

      .modal-header h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <h1 id="siteTitle">自陣キャラ図鑑</h1>
        <p id="siteSubtitle">自陣管理シート</p>
      </div>

      <div class="header-buttons">
        <a class="compare-link" href="./compare.html">質問一覧</a>
        <a class="compare-link" href="./stats.html">ステータス比較</a>
        <button class="title-edit-button" onclick="openSettings()">タイトルを編集</button>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="section-title">
        <div>
          <h2>HOME</h2>
          <div class="note">カードをクリックすると詳細プロフィールが開きます</div>
        </div>

        <button class="reload-button" onclick="loadData()">再読み込み</button>
      </div>

      <div class="character-list" id="characterList">
        <p class="empty">読み込み中...</p>
      </div>
    </section>

    <details class="panel add-panel" id="addPanel">
      <summary id="formSummary">＋ キャラクターを追加する</summary>

      <div class="form-content">
        <div id="editNotice" class="form-actions-top"></div>
        <div id="formFields"></div>
        <div id="statsFields"></div>

        <button id="submitButton" onclick="submitCharacter()">追加する</button>
        <button class="secondary-button" id="cancelEditButton" onclick="cancelEdit()" style="display:none;">編集をやめる</button>

        <p id="message"></p>
      </div>
    </details>

    <details class="panel add-panel">
      <summary>＋ 質問項目を追加する</summary>

      <div class="form-content">
        <div class="form-grid">
          <div class="form-item full">
            <label for="newQuestionLabel">質問名</label>
            <input id="newQuestionLabel" type="text">
          </div>

          <div class="form-item">
            <label for="newQuestionGroup">カテゴリ</label>
            <select id="newQuestionGroup">
              <option value="基本プロフィール">基本プロフィール</option>
              <option value="好きなもの・日常">好きなもの・日常</option>
              <option value="恋愛・嗜好">恋愛・嗜好</option>
              <option value="過去・価値観・物語">過去・価値観・物語</option>
              <option value="追加質問">追加質問</option>
            </select>
          </div>

          <div class="form-item">
            <label for="newQuestionType">入力形式</label>
            <select id="newQuestionType">
              <option value="text">短文</option>
              <option value="textarea">長文</option>
              <option value="number">数字</option>
            </select>
          </div>
        </div>

        <button onclick="submitQuestion()">質問を追加する</button>
        <p id="questionMessage"></p>
      </div>
    </details>
  </main>

  <dialog id="detailDialog">
    <div id="modalContent"></div>
  </dialog>

  <dialog id="settingsDialog">
    <div class="settings-form">
      <h2>タイトル設定</h2>

      <label for="settingTitle">タイトル</label>
      <input id="settingTitle" type="text">

      <label for="settingSubtitle" style="margin-top: 12px;">説明文</label>
      <input id="settingSubtitle" type="text">

      <div class="settings-actions">
        <button class="secondary-button" onclick="resetSettings()">初期値に戻す</button>
        <button onclick="saveSettings()">保存する</button>
        <button class="close-button" onclick="closeSettings()">閉じる</button>
      </div>
    </div>
  </dialog>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz6cbVwkuuVhSlIW405gepzZi7VzzBPtYzosb2Bi1wZ6WOw4qm82KMhVBl__nUVwoLu/exec";
    const DEFAULT_SITE_TITLE = "自陣キャラ図鑑";
    const DEFAULT_SITE_SUBTITLE = "自陣管理シート";

    let localCharacters = [];
    let questionList = [];
    let statsList = [];
    let statsMap = {};
    let editingId = null;

    const STAT_GROUPS = [
      {
        title: "基本ステータス",
        keys: ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"]
      },
      {
        title: "基本戦闘技能",
        keys: ["回避", "キック", "組み付き", "こぶし（パンチ）", "頭突き", "投擲", "マーシャルアーツ", "拳銃", "サブマシンガン", "ショットガン", "マシンガン", "ライフル"]
      },
      {
        title: "基本探索技能",
        keys: ["応急手当", "鍵開け", "隠す", "隠れる", "聞き耳", "忍び歩き", "写真術", "精神分析", "追跡", "登攀", "図書館", "目星"]
      },
      {
        title: "基本行動技能",
        keys: ["運転", "機械修理", "重機械操作", "乗馬", "水泳", "製作", "操縦", "跳躍", "電気修理", "ナビゲート", "変装"]
      },
      {
        title: "基本交渉技能",
        keys: ["言いくるめ", "信用", "説得", "値切り", "母国語", "日本語", "ヒプノーシス"]
      },
      {
        title: "基本知識技能",
        keys: ["医学", "オカルト", "化学", "クトゥルフ神話", "芸術", "経理", "考古学", "コンピューター", "心理学", "人類学", "生物学", "地質学", "電子工学", "天文学", "博物学", "物理学", "法律", "薬学", "歴史"]
      }
    ];

    const FIXED_FIELDS = [
      { key: "name", label: "名前", type: "text", required: true },
      { key: "furigana", label: "ふりがな", type: "text" },
      { key: "emoji", label: "絵文字（モチーフ／イメージ等）", type: "text" },
      { key: "iconData", label: "顔・アイコン画像", type: "image", hideInDetail: true }
    ];

    function applySettings() {
      const title = localStorage.getItem("siteTitle") || DEFAULT_SITE_TITLE;
      const subtitle = localStorage.getItem("siteSubtitle") || DEFAULT_SITE_SUBTITLE;

      document.getElementById("siteTitle").textContent = title;
      document.getElementById("siteSubtitle").textContent = subtitle;
      document.title = title;
    }

    function openSettings() {
      document.getElementById("settingTitle").value =
        localStorage.getItem("siteTitle") || DEFAULT_SITE_TITLE;
      document.getElementById("settingSubtitle").value =
        localStorage.getItem("siteSubtitle") || DEFAULT_SITE_SUBTITLE;
      document.getElementById("settingsDialog").showModal();
    }

    function closeSettings() {
      document.getElementById("settingsDialog").close();
    }

    function saveSettings() {
      const title = document.getElementById("settingTitle").value.trim() || DEFAULT_SITE_TITLE;
      const subtitle = document.getElementById("settingSubtitle").value.trim() || DEFAULT_SITE_SUBTITLE;

      localStorage.setItem("siteTitle", title);
      localStorage.setItem("siteSubtitle", subtitle);

      applySettings();
      closeSettings();
    }

    function resetSettings() {
      localStorage.removeItem("siteTitle");
      localStorage.removeItem("siteSubtitle");
      applySettings();
      closeSettings();
    }

    function loadData() {
      const list = document.getElementById("characterList");
      list.innerHTML = `<p class="empty">読み込み中...</p>`;

      const oldScript = document.getElementById("jsonpScript");
      if (oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "jsonpScript";
      script.src = API_URL + "?callback=receiveData&v=" + Date.now();

      script.onerror = function () {
        list.innerHTML = `
          <p class="empty">
            読み込みに失敗しました。<br>
            Apps Scriptのデプロイ設定、またはスプレッドシートのシート名を確認してください。
          </p>
        `;
      };

      document.body.appendChild(script);
    }

    function receiveData(payload) {
      if (Array.isArray(payload)) {
        localCharacters = payload.filter(c => c.teamId === "paranormal-crime").reverse();
        questionList = [];
      } else {
        localCharacters = (payload.characters || [])
          .filter(c => c.teamId === "paranormal-crime")
          .reverse();
        questionList = uniqueQuestions((payload.questions || []).filter(q => q.showInForm !== false));
        statsList = payload.stats || [];
        statsMap = {};
        statsList.forEach(item => {
          if (item.characterId) statsMap[item.characterId] = item;
        });
      }

      setupForm();
      renderCharacters();
    }

    function uniqueQuestions(questions) {
      const fixed = { name: true, furigana: true, emoji: true, iconData: true };
      const seen = {};
      return questions.filter(question => {
        if (!question || !question.key || fixed[question.key]) return false;
        if (seen[question.key]) return false;
        seen[question.key] = true;
        return true;
      });
    }

    function getGroupedQuestions() {
      const groups = [];

      const basicFixed = {
        title: "基本プロフィール",
        open: true,
        fields: FIXED_FIELDS
      };
      groups.push(basicFixed);

      questionList.forEach(question => {
        const groupName = question.group || "追加質問";
        let group = groups.find(g => g.title === groupName);

        if (!group) {
          group = {
            title: groupName,
            open: false,
            fields: []
          };
          groups.push(group);
        }

        group.fields.push({
          key: question.key,
          label: question.label,
          type: question.type || "text"
        });
      });

      return groups;
    }

    function setupForm() {
      const form = document.getElementById("formFields");
      const groups = getGroupedQuestions();

      form.innerHTML = groups.map(group => `
        <details class="form-group" ${group.open ? "open" : ""}>
          <summary>▼ ${escapeHtml(group.title)}</summary>
          <div class="form-grid">
            ${group.fields.map(field => renderFormField(field)).join("")}
          </div>
        </details>
      `).join("");

      renderStatsFields();
      setupColorSync();
      setupImageInput();
      updateIconPreviewBackground();
    }

    function renderStatsFields() {
      const box = document.getElementById("statsFields");

      box.innerHTML = `
        <details class="form-group">
          <summary>▼ ステータス・技能</summary>
          <div class="stat-note">
            キャラクター登録と同時に保存できます。STR〜EDUはステータス比較ページの八角形グラフに反映されます。
          </div>
          ${STAT_GROUPS.map(group => `
            <div class="stat-group">
              <h3>${escapeHtml(group.title)}</h3>
              <div class="form-grid">
                ${group.keys.map(key => `
                  <div class="form-item">
                    <label for="stat_${escapeAttribute(key)}">${escapeHtml(key)}</label>
                    <input id="stat_${escapeAttribute(key)}" data-stat-key="${escapeAttribute(key)}" type="number" min="0" max="999" step="1">
                  </div>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </details>
      `;
    }

    function collectStatsFromForm() {
      const stats = {};

      document.querySelectorAll("[data-stat-key]").forEach(input => {
        const key = input.dataset.statKey;
        stats[key] = input.value.trim();
      });

      return stats;
    }

    function fillStatsForm(characterId) {
      const stats = statsMap[characterId] || {};

      document.querySelectorAll("[data-stat-key]").forEach(input => {
        const key = input.dataset.statKey;
        input.value = stats[key] || "";
      });
    }

    function clearStatsForm() {
      document.querySelectorAll("[data-stat-key]").forEach(input => {
        input.value = "";
      });
    }

    function renderFormField(field) {
      const required = field.required ? "required" : "";

      if (field.type === "textarea") {
        return `
          <div class="form-item full">
            <label for="${field.key}">${escapeHtml(field.label)}</label>
            <textarea id="${field.key}"></textarea>
          </div>
        `;
      }

      if (field.type === "image") {
        return `
          <div class="form-item full">
            <label>${escapeHtml(field.label)}</label>
            <div class="image-upload-box">
              <div class="image-preview" id="iconPreview">👤</div>
              <div>
                <input id="iconFile" type="file" accept="image/*">
                <input id="iconData" type="hidden">
                <button type="button" class="secondary-button" onclick="removeIcon()">画像を削除</button>
                <div class="image-help">
                  スマホから画像を選べます。透過PNGは透過を残したまま保存され、イメージカラー背景の上に表示されます。
                </div>
              </div>
            </div>
          </div>
        `;
      }

      if (field.type === "color") {
        return `
          <div class="form-item full">
            <label>${escapeHtml(field.label)}</label>
            <div class="color-row">
              <input id="${field.key}_picker" type="color" value="#4682b4">
              <input id="${field.key}" value="#4682b4" maxlength="7">
            </div>
          </div>
        `;
      }

      if (field.type === "birthday") {
        return `
          <div class="form-item">
            <label>${escapeHtml(field.label)}</label>
            <div class="birthday-row">
              <select id="birthdayMonth">
                <option value="">月</option>
                ${Array.from({ length: 12 }, (_, i) => `<option value="${String(i + 1).padStart(2, "0")}">${i + 1}月</option>`).join("")}
              </select>
              <select id="birthdayDay">
                <option value="">日</option>
                ${Array.from({ length: 31 }, (_, i) => `<option value="${String(i + 1).padStart(2, "0")}">${i + 1}日</option>`).join("")}
              </select>
            </div>
          </div>
        `;
      }

      const inputType = field.type === "number" ? "number" : "text";
      const numberAttrs = field.type === "number" ? `min="0" step="1"` : "";

      return `
        <div class="form-item">
          <label for="${field.key}">${escapeHtml(field.label)}</label>
          <input id="${field.key}" type="${inputType}" ${numberAttrs} ${required}>
        </div>
      `;
    }

    function setupColorSync() {
      const colorPicker = document.getElementById("imageColor_picker");
      const colorCode = document.getElementById("imageColor");

      if (!colorPicker || !colorCode) return;

      colorPicker.addEventListener("input", function () {
        colorCode.value = colorPicker.value;
        updateIconPreviewBackground();
      });

      colorCode.addEventListener("input", function () {
        const value = normalizeColorForSave(colorCode.value);
        if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
          colorPicker.value = value;
          updateIconPreviewBackground();
        }
      });
    }

    function updateIconPreviewBackground() {
      const preview = document.getElementById("iconPreview");
      if (!preview) return;

      const color = normalizeColorForDisplay(document.getElementById("imageColor")?.value || "#4682b4");
      preview.style.background = color;
    }

    function setupImageInput() {
      const fileInput = document.getElementById("iconFile");
      if (!fileInput) return;

      fileInput.addEventListener("change", async function () {
        const file = fileInput.files[0];
        if (!file) return;

        document.getElementById("message").textContent = "画像を読み込み中...";

        try {
          const dataUrl = await compressImage(file);
          document.getElementById("iconData").value = dataUrl;
          showIconPreview(dataUrl);
          document.getElementById("message").textContent = "画像を設定しました。";
        } catch (error) {
          document.getElementById("message").textContent = "画像の読み込みに失敗しました。別の画像を試してください。";
        }
      });
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function (event) {
          const img = new Image();

          img.onload = function () {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const drawIcon = (size) => {
              canvas.width = size;
              canvas.height = size;

              ctx.clearRect(0, 0, canvas.width, canvas.height);

              const ratio = Math.min(size / img.width, size / img.height);
              const drawWidth = Math.round(img.width * ratio);
              const drawHeight = Math.round(img.height * ratio);
              const x = Math.round((size - drawWidth) / 2);
              const y = Math.round((size - drawHeight) / 2);

              ctx.drawImage(img, x, y, drawWidth, drawHeight);

              return canvas.toDataURL("image/png");
            };

            let dataUrl = drawIcon(160);

            if (dataUrl.length > 50000) dataUrl = drawIcon(128);
            if (dataUrl.length > 50000) dataUrl = drawIcon(96);

            if (dataUrl.length > 50000) {
              reject(new Error("image too large"));
              return;
            }

            resolve(dataUrl);
          };

          img.onerror = reject;
          img.src = event.target.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showIconPreview(dataUrl) {
      const preview = document.getElementById("iconPreview");
      if (!preview) return;

      updateIconPreviewBackground();

      if (dataUrl) {
        preview.innerHTML = `<img src="${dataUrl}" alt="icon">`;
      } else {
        const emoji = document.getElementById("emoji")?.value || "👤";
        preview.textContent = emoji || "👤";
      }
    }

    function removeIcon() {
      document.getElementById("iconData").value = "";
      const fileInput = document.getElementById("iconFile");
      if (fileInput) fileInput.value = "";
      showIconPreview("");
      clearStatsForm();
    }

    async function submitCharacter() {
      const character = {
        teamId: "paranormal-crime",
        mode: editingId ? "update" : "create",
        id: editingId || ""
      };

      const groups = getGroupedQuestions();

      groups.forEach(group => {
        group.fields.forEach(field => {
          if (field.type === "birthday") {
            character.birthdayMonth = document.getElementById("birthdayMonth").value;
            character.birthdayDay = document.getElementById("birthdayDay").value;
          } else {
            const el = document.getElementById(field.key);
            character[field.key] = el ? el.value.trim() : "";
          }
        });
      });

      character.__stats = collectStatsFromForm();

      if (character.imageColor) {
        character.imageColor = normalizeColorForSave(character.imageColor);
      }

      if (!character.name) {
        document.getElementById("message").textContent = "名前を入れてください。";
        return;
      }

      if (character.age && !/^[0-9]+$/.test(character.age)) {
        document.getElementById("message").textContent = "年齢は数字だけで入力してください。";
        return;
      }

      if (character.relationshipCount && !/^[0-9]+$/.test(character.relationshipCount)) {
        document.getElementById("message").textContent = "今まで付き合った人数は数字だけで入力してください。";
        return;
      }

      if (character.imageColor && !/^#[0-9A-Fa-f]{6}$/.test(character.imageColor)) {
        document.getElementById("message").textContent = "イメージカラーは #4682b4 のような形式で入力してください。";
        return;
      }

      document.getElementById("message").textContent = editingId ? "更新中..." : "送信中...";

      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(character)
        });

        document.getElementById("message").textContent = editingId ? "更新しました！一覧を更新します。" : "追加しました！一覧を更新します。";

        clearForm();
        cancelEdit(false);
        setTimeout(loadData, 1000);

      } catch (error) {
        document.getElementById("message").textContent = "送信に失敗しました。";
      }
    }

    async function submitQuestion() {
      const label = document.getElementById("newQuestionLabel").value.trim();
      const group = document.getElementById("newQuestionGroup").value;
      const type = document.getElementById("newQuestionType").value;

      if (!label) {
        document.getElementById("questionMessage").textContent = "質問名を入れてください。";
        return;
      }

      document.getElementById("questionMessage").textContent = "質問を追加中...";

      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mode: "addQuestion",
            label: label,
            group: group,
            type: type
          })
        });

        document.getElementById("questionMessage").textContent = "質問を追加しました！再読み込みします。";
        document.getElementById("newQuestionLabel").value = "";

        setTimeout(loadData, 1000);

      } catch (error) {
        document.getElementById("questionMessage").textContent = "質問の追加に失敗しました。";
      }
    }

    function startEdit(index) {
      const c = localCharacters[index];
      editingId = c.id;

      document.getElementById("detailDialog").close();
      document.getElementById("addPanel").open = true;
      document.getElementById("formSummary").textContent = "✎ キャラクターを編集中";
      document.getElementById("submitButton").textContent = "更新する";
      document.getElementById("cancelEditButton").style.display = "inline-block";

      const notice = document.getElementById("editNotice");
      notice.classList.add("active");
      notice.textContent = `「${c.name || "名前未設定"}」を編集中です。`;

      const groups = getGroupedQuestions();

      groups.forEach(group => {
        group.fields.forEach(field => {
          if (field.type === "birthday") {
            document.getElementById("birthdayMonth").value = c.birthdayMonth || "";
            document.getElementById("birthdayDay").value = c.birthdayDay || "";
          } else {
            const el = document.getElementById(field.key);
            if (el) el.value = c[field.key] || "";
          }
        });
      });

      const color = normalizeColorForDisplay(c.imageColor);
      const colorInput = document.getElementById("imageColor");
      const colorPicker = document.getElementById("imageColor_picker");

      if (colorInput) colorInput.value = color;
      if (colorPicker) colorPicker.value = color;

      updateIconPreviewBackground();
      showIconPreview(c.iconData || "");
      fillStatsForm(c.id);

      const iconFile = document.getElementById("iconFile");
      if (iconFile) iconFile.value = "";

      document.getElementById("message").textContent = "";
      document.getElementById("addPanel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEdit(shouldClear = true) {
      editingId = null;
      document.getElementById("formSummary").textContent = "＋ キャラクターを追加する";
      document.getElementById("submitButton").textContent = "追加する";
      document.getElementById("cancelEditButton").style.display = "none";

      const notice = document.getElementById("editNotice");
      notice.classList.remove("active");
      notice.textContent = "";

      if (shouldClear) {
        clearForm();
        document.getElementById("message").textContent = "";
      }
    }

    function clearForm() {
      const groups = getGroupedQuestions();

      groups.forEach(group => {
        group.fields.forEach(field => {
          if (field.type === "birthday") {
            document.getElementById("birthdayMonth").value = "";
            document.getElementById("birthdayDay").value = "";
            return;
          }

          const el = document.getElementById(field.key);
          if (!el) return;

          if (field.key === "imageColor") {
            el.value = "#4682b4";
            const picker = document.getElementById("imageColor_picker");
            if (picker) picker.value = "#4682b4";
          } else {
            el.value = "";
          }
        });
      });

      const iconFile = document.getElementById("iconFile");
      if (iconFile) iconFile.value = "";

      showIconPreview("");
    }

    function renderCharacters() {
      const list = document.getElementById("characterList");

      if (localCharacters.length === 0) {
        list.innerHTML = `
          <p class="empty">
            まだキャラクターが登録されていません。<br>
            下の「＋ キャラクターを追加する」から追加してみてください。
          </p>
        `;
        return;
      }

      list.innerHTML = localCharacters.map((c, index) => {
        const color = normalizeColorForDisplay(c.imageColor);
        const birthdayText = formatBirthday(c.birthdayMonth, c.birthdayDay);
        const emoji = c.emoji || "👤";
        const avatarHtml = c.iconData
          ? `<div class="avatar" style="--character-color: ${color};"><img src="${c.iconData}" alt="${escapeAttribute(c.name || "icon")}"></div>`
          : `<div class="avatar-placeholder" style="--character-color: ${color};">${escapeHtml(emoji)}</div>`;

        return `
          <div class="card" style="--character-color: ${color};" onclick="openDetail(${index})">
            <div class="card-top">
              ${avatarHtml}
              <div>
                <div class="name">${escapeHtml(c.name)}</div>
                <div class="furigana">${escapeHtml(c.furigana) || "ふりがな未設定"}</div>
              </div>
            </div>
            <div class="sub">
              ${escapeHtml(c.job) || "職業未設定"} / ${escapeHtml(c.age) || "年齢未設定"}歳<br>
              誕生日：${escapeHtml(birthdayText)}
            </div>
            <div class="card-tags">
              <span class="info-chip">
                <span class="color-dot"></span>
                <span>${escapeHtml(c.imageColor) || "カラー未設定"}</span>
              </span>
              <span class="info-chip">
                <span class="chip-emoji">${escapeHtml(emoji)}</span>
              </span>
            </div>
          </div>
        `;
      }).join("");
    }

    function openDetail(index) {
      const c = localCharacters[index];
      const color = normalizeColorForDisplay(c.imageColor);
      const dialog = document.getElementById("detailDialog");
      const modal = document.getElementById("modalContent");

      const emoji = c.emoji || "👤";
      const avatarHtml = c.iconData
        ? `<div class="modal-avatar" style="--character-color: ${color};"><img src="${c.iconData}" alt="${escapeAttribute(c.name || "icon")}"></div>`
        : `<div class="modal-avatar-placeholder" style="--character-color: ${color};">${escapeHtml(emoji)}</div>`;

      const groups = getGroupedQuestions();

      modal.innerHTML = `
        <div class="modal-header" style="--character-color: ${color};">
          <div class="modal-header-inner">
            ${avatarHtml}
            <div>
              <h2>${escapeHtml(c.name) || "名前未設定"}</h2>
              <p>${escapeHtml(c.furigana) || "ふりがな未設定"} / ${escapeHtml(c.job) || "職業未設定"}</p>
            </div>
          </div>
        </div>

        <div class="modal-body">
          ${groups.map(group => `
            <div class="detail-section">
              <h3>${escapeHtml(group.title)}</h3>
              <div class="detail-grid">
                ${group.fields.filter(field => !field.hideInDetail).map(field => `
                  <div class="detail-item">
                    <div class="detail-label">${escapeHtml(field.label)}</div>
                    <div class="detail-value">${escapeHtml(formatValue(c, field)) || "未設定"}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </div>

        <div class="modal-footer">
          <button class="edit-button" onclick="startEdit(${index})">編集する</button>
          <button class="close-button" onclick="closeDetail()">閉じる</button>
        </div>
      `;

      dialog.showModal();
    }

    function closeDetail() {
      document.getElementById("detailDialog").close();
    }

    function formatValue(character, field) {
      if (field.type === "birthday") {
        return formatBirthday(character.birthdayMonth, character.birthdayDay);
      }

      const value = character[field.key];

      if (!value) return "";

      return String(value);
    }

    function formatBirthday(month, day) {
      if (!month && !day) return "未設定";
      if (month && day) return `${Number(month)}月${Number(day)}日`;
      if (month) return `${Number(month)}月`;
      if (day) return `${Number(day)}日`;
      return "未設定";
    }

    function normalizeColorForSave(color) {
      if (!color) return "#4682b4";
      let text = String(color).trim();

      if (!text.startsWith("#")) {
        text = "#" + text;
      }

      if (/^#[0-9A-Fa-f]{6}$/.test(text)) {
        return text.toLowerCase();
      }

      return text;
    }

    function normalizeColorForDisplay(color) {
      if (!color) return "#999999";
      const text = String(color).trim();

      if (/^#[0-9A-Fa-f]{6}$/.test(text)) {
        return text;
      }

      return "#999999";
    }

    function escapeHtml(text) {
      if (!text) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }

    applySettings();
    loadData();
  </script>
</body>
