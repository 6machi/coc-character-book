<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>質問一覧</title>

  <style>
    :root {
      --page-bg: #f7f7f8;
      --panel-bg: #ffffff;
      --text-main: #222222;
      --text-sub: #666666;
      --text-muted: #8a8a8a;
      --line: #d8d8dc;
      --soft-line: #ececef;
      --label-bg: #f3f4f6;
      --header-bg: #ffffff;
      --group-bg: #e9ecef;
      --button-light: #f1f1f3;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
    }

    header {
      padding: 28px 20px 20px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    p {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-button {
      background: var(--button-light);
      color: var(--text-main);
      border: 1px solid var(--line);
      font-size: 13px;
      padding: 9px 14px;
      border-radius: 999px;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .panel h2 {
      margin: 0;
      font-size: 22px;
    }

    .note {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .table-wrap {
      margin-top: 0;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      max-height: 75vh;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 100%;
      width: max-content;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 7px 9px;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.7;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #ffffff;
    }

    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 4;
      background: var(--label-bg);
      min-width: 220px;
      max-width: 220px;
      width: 220px;
      font-weight: bold;
    }

    thead .sticky-col {
      z-index: 6;
      background: #e9ecef;
    }

    .character-col {
      --character-color: #999999;
      min-width: 150px;
      max-width: 150px;
      width: 150px;
      text-align: center;
      background: #ffffff;
      padding: 4px 6px;
    }

    .char-head {
      display: grid;
      gap: 1px;
      justify-items: center;
    }

    .char-furigana {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.15;
    }

    .char-name {
      font-size: 13px;
      font-weight: bold;
      line-height: 1.15;
    }

    .char-avatar,
    .char-avatar-emoji {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.12);
      background: var(--character-color);
    }

    .char-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .char-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .char-avatar-emoji {
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .group-row th,
    .group-row td {
      background: var(--group-bg);
      font-weight: bold;
      color: #334;
    }

    .group-row .sticky-col {
      background: #dfe5e8;
      z-index: 3;
    }

    .empty,
    .loading {
      padding: 20px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .color-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.2);
      display: inline-block;
    }

    .emoji-inline {
      font-size: 16px;
    }

    @media (max-width: 700px) {
      .header-inner {
        display: block;
      }

      .header-buttons {
        margin-top: 14px;
      }

      main {
        padding: 14px;
      }

      .panel {
        padding: 16px;
      }

      .sticky-col {
        min-width: 150px;
        max-width: 150px;
        width: 150px;
      }

      .character-col {
        min-width: 130px;
        max-width: 130px;
        width: 130px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <h1 id="siteTitle">自陣キャラ図鑑</h1>
        <p>質問一覧</p>
      </div>

      <div class="header-buttons">
        <a class="header-button" href="./index.html">HOME</a>
        <a class="header-button" href="./stats.html">ステータス比較</a>
        <button class="header-button" onclick="loadData()">再読み込み</button>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="table-wrap compact-table" id="tableWrap">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz6cbVwkuuVhSlIW405gepzZi7VzzBPtYzosb2Bi1wZ6WOw4qm82KMhVBl__nUVwoLu/exec";

    let localCharacters = [];
    let questionList = [];

    function applySettings() {
      const title = localStorage.getItem("siteTitle") || "自陣キャラ図鑑";
      document.getElementById("siteTitle").textContent = title;
      document.title = title + " - 質問一覧";
    }

    function loadData() {
      const wrap = document.getElementById("tableWrap");
      wrap.innerHTML = `<div class="loading">読み込み中...</div>`;

      const oldScript = document.getElementById("jsonpScript");
      if (oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "jsonpScript";
      script.src = API_URL + "?callback=receiveData&light=1&v=" + Date.now();

      script.onerror = function () {
        wrap.innerHTML = `
          <div class="empty">
            読み込みに失敗しました。<br>
            Apps Scriptのデプロイ設定、またはスプレッドシートのシート名を確認してください。
          </div>
        `;
      };

      document.body.appendChild(script);
    }

    function receiveData(payload) {
      if (Array.isArray(payload)) {
        localCharacters = payload.filter(c => c.teamId === "paranormal-crime").reverse();
        questionList = [];
      } else {
        localCharacters = (payload.characters || [])
          .filter(c => c.teamId === "paranormal-crime")
          .reverse();
        questionList = uniqueQuestions((payload.questions || []).filter(q => q.showInCompare !== false));
      }

      renderTable();
    }

    function uniqueQuestions(questions) {
      const fixed = { name: true, furigana: true, emoji: true, iconData: true };
      const seen = {};
      return questions.filter(question => {
        if (!question || !question.key || fixed[question.key]) return false;
        if (seen[question.key]) return false;
        seen[question.key] = true;
        return true;
      });
    }

    function getCompareQuestions() {
      return questionList.slice();
    }

    function renderTable() {
      const wrap = document.getElementById("tableWrap");

      if (localCharacters.length === 0) {
        wrap.innerHTML = `
          <div class="empty">
            まだキャラクターが登録されていません。
          </div>
        `;
        return;
      }

      const questions = getCompareQuestions();

      const headerHtml = `
        <thead>
          <tr>
            <th class="sticky-col">項目</th>
            ${localCharacters.map(character => {
              const color = normalizeColorForDisplay(character.imageColor);
              const emoji = character.emoji || "👤";
              const avatar = `<div class="char-avatar-emoji" style="--character-color:${color};">${escapeHtml(emoji)}</div>`;

              return `
                <th class="character-col" style="--character-color:${color};">
                  <div class="char-head">
                    <div class="char-furigana">${escapeHtml(character.furigana) || "ふりがな未設定"}</div>
                    <div class="char-name">${escapeHtml(character.name) || "名前未設定"}</div>
                    ${avatar}
                  </div>
                </th>
              `;
            }).join("")}
          </tr>
        </thead>
      `;

      const groupedQuestions = groupQuestions(questions);

      const bodyRows = groupedQuestions.map(group => {
        const groupRow = `
          <tr class="group-row">
            <th class="sticky-col">${escapeHtml(group.title)}</th>
            ${localCharacters.map(character => `
              <td style="background:${softColor(normalizeColorForDisplay(character.imageColor))};"></td>
            `).join("")}
          </tr>
        `;

        const fieldRows = group.fields.map(field => {
          return `
            <tr>
              <th class="sticky-col">${escapeHtml(field.label)}</th>
              ${localCharacters.map(character => `
                <td style="background:${softColor(normalizeColorForDisplay(character.imageColor))};">${renderCell(character, field)}</td>
              `).join("")}
            </tr>
          `;
        }).join("");

        return groupRow + fieldRows;
      }).join("");

      wrap.innerHTML = `
        <table>
          ${headerHtml}
          <tbody>
            ${bodyRows}
          </tbody>
        </table>
      `;
    }

    function groupQuestions(questions) {
      const groups = [];

      questions.forEach(question => {
        const groupName = question.group || "追加質問";
        let group = groups.find(g => g.title === groupName);

        if (!group) {
          group = {
            title: groupName,
            fields: []
          };
          groups.push(group);
        }

        group.fields.push(question);
      });

      return groups;
    }

    function renderCell(character, field) {
      if (field.type === "birthday") {
        return escapeHtml(formatBirthday(character.birthdayMonth, character.birthdayDay));
      }

      if (field.type === "color") {
        const color = normalizeColorForDisplay(character.imageColor);
        return `
          <div class="color-cell">
            <span class="color-dot" style="background:${color};"></span>
            <span>${escapeHtml(character.imageColor || "未設定")}</span>
          </div>
        `;
      }

      if (field.type === "emoji") {
        return `<span class="emoji-inline">${escapeHtml(character.emoji || "👤")}</span>`;
      }

      const value = character[field.key];

      if (!value) return "—";

      return escapeHtml(String(value));
    }

    function formatBirthday(month, day) {
      if (!month && !day) return "未設定";
      if (month && day) return `${Number(month)}月${Number(day)}日`;
      if (month) return `${Number(month)}月`;
      if (day) return `${Number(day)}日`;
      return "未設定";
    }

    function normalizeColorForDisplay(color) {
      if (!color) return "#999999";

      const text = String(color).trim();

      if (/^#[0-9A-Fa-f]{6}$/.test(text)) {
        return text;
      }

      return "#999999";
    }

    function softColor(hex) {
      const rgb = hexToRgb(hex) || { r: 153, g: 153, b: 153 };
      return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.08)`;
    }

    function hexToRgb(hex) {
      const match = String(hex).match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);

      if (!match) return null;

      return {
        r: parseInt(match[1], 16),
        g: parseInt(match[2], 16),
        b: parseInt(match[3], 16)
      };
    }

    function escapeHtml(text) {
      if (!text) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }

    applySettings();
    loadData();
  </script>
</body>
</html>
