<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>質問</title><link rel="stylesheet" href="./style.css"></head><body><header><div class="header-inner"><div><h1 class="site-brand">自陣キャラ図鑑</h1></div><div class="header-buttons"><a class="header-button" href="./index.html">キャラクター</a><a class="header-button" href="./stats.html">ステータス</a><a class="header-button" href="./timeline.html">時系列</a></div></div></header><main><section class="panel" style="padding:12px"><div class="table-wrap" id="wrap"><p class="note">読み込み中...</p></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script src="./common.js"></script><script>async function init(){let t=await team();await ensureQ();let [q,r]=await Promise.all([qs(),sb.from('characters').select('id,name,furigana,emoji,icon_url,image_color,basic,answers,created_at').eq('team_id',t.id).order('created_at',{ascending:false})]);if(r.error)throw r.error;render(r.data||[],q)}function render(chs,q){if(!chs.length){wrap.innerHTML='<p class="note">まだキャラクターが登録されていません。</p>';return}let qq=FIXED.filter(x=>x.key!=='emoji').concat(q),gs=groups(qq,false);let head=`<thead><tr><th class="sticky-col">項目</th>${chs.map(ch=>{let cc=col(ch.image_color),em=ch.emoji||'👤';return`<th class="character-col"><div style="font-size:10px;color:#888;line-height:1.1">${e(ch.furigana)||'ふりがな未設定'}</div><div style="font-size:13px;font-weight:bold;line-height:1.15">${e(ch.name)||'名前未設定'}</div>${ch.icon_url?`<div class="mini-emoji compare-icon" style="--c:${cc};margin:3px auto 0"><img src="${e(ch.icon_url)}" alt="icon"></div>`:`<div class="mini-emoji" style="--c:${cc};margin:3px auto 0">${e(em)}</div>`}</th>`}).join('')}</tr></thead>`;let rows=gs.map(g=>`<tr class="group-row"><th class="sticky-col">${e(g.title)}</th>${chs.map(ch=>`<td style="background:${soft(col(ch.image_color))}"></td>`).join('')}</tr>`+g.fields.map(q=>`<tr><th class="sticky-col">${e(q.label)}</th>${chs.map(ch=>`<td style="background:${soft(col(ch.image_color))}">${e(qv(ch,q))||'—'}</td>`).join('')}</tr>`).join('')).join('');wrap.innerHTML=`<table>${head}<tbody>${rows}</tbody></table>`}init().catch(x=>wrap.innerHTML='<p class="note">読み込み失敗：'+e(x.message)+'</p>')</script></body></html>
