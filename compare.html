<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>キャラQ&A</title><link rel="stylesheet" href="./style.css?v=147"></head><body><header><div class="header-inner"><div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div><div class="header-buttons"><a class="header-button" href="./index.html">キャラクター</a><a class="header-button" href="./stats.html">ステータス</a><a class="header-button" href="./timeline.html">時系列</a><a class="header-button" href="./relationship.html">相関図</a></div></div></header><main><section class="panel" style="padding:12px"><div class="page-title-row"><h2>キャラQ&A</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="キャラQ&Aの説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>キャラQ&A</b>質問項目ごとに、各キャラクターの回答を見比べられます。スマホでは質問ごとのカード表示になります。</span></span></div><div class="table-wrap compare-desktop" id="wrap"><p class="note">読み込み中...</p></div><div id="mobileCompare" class="mobile-compare"></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js?v=147"></script><script src="./common.js?v=147"></script><script>initSiteTitle();</script><script>
async function init(){let t=await team();await ensureQ();let [q,r]=await Promise.all([qs(),sb.from('characters').select('id,name,furigana,emoji,icon_url,image_color,basic,answers,created_at,sort_order').eq('team_id',t.id).order('sort_order',{ascending:true,nullsFirst:false}).order('created_at',{ascending:true})]);if(r.error)throw r.error;render(r.data||[],q)}
function render(chs,q){chs=sortedCharacters(chs);if(!chs.length){wrap.innerHTML='<p class="note">まだキャラクターが登録されていません。</p>';mobileCompare.innerHTML='';return}let qq=FIXED.filter(x=>x.key!=='emoji').concat(q),gs=groups(qq,false);let head=`<thead><tr><th class="sticky-col">項目</th>${chs.map(ch=>{let cc=col(ch.image_color),em=firstEmoji(ch.emoji);return`<th class="character-col"><div style="font-size:10px;color:#888;line-height:1.1">${e(ch.furigana)||'ふりがな未設定'}</div><div style="font-size:13px;font-weight:bold;line-height:1.15">${e(ch.name)||'名前未設定'}</div>${ch.icon_url?`<div class="mini-emoji compare-icon" style="--c:${cc};margin:3px auto 0"><img src="${e(ch.icon_url)}" alt="icon"></div>`:`<div class="mini-emoji" style="--c:${cc};margin:3px auto 0">${e(em)}</div>`}</th>`}).join('')}</tr></thead>`;let rows=gs.map(g=>`<tr class="group-row"><th class="sticky-col">${e(g.title)}</th>${chs.map(ch=>`<td style="background:${soft(col(ch.image_color))}"></td>`).join('')}</tr>`+g.fields.map(q=>`<tr><th class="sticky-col">${e(q.label)}</th>${chs.map(ch=>`<td style="background:${soft(col(ch.image_color))}">${formatAnswer(qv(ch,q))||'—'}</td>`).join('')}</tr>`).join('')).join('');wrap.innerHTML=`<table>${head}<tbody>${rows}</tbody></table>`;renderMobile(chs,gs)}
function formatAnswer(v){return e(v||'').replace(/\n/g,'<br>')}
function mobileFieldGroups(gs){return gs.map(g=>{let fields=[];for(let i=0;i<g.fields.length;i++){let q=g.fields[i];let m=String(q.key||'').match(/^importantPerson(\d+)Name$/);if(m){let rel=g.fields.find(x=>x.key===`importantPerson${m[1]}Relation`);if(rel){fields.push({...q,_pair:rel,label:`大切な人${m[1]}`});continue}}if(/^importantPerson\d+Relation$/.test(String(q.key||'')))continue;fields.push(q)}return{...g,fields}})}
function renderMobile(chs,gs){const fixedGs=mobileFieldGroups(gs);mobileCompare.innerHTML=fixedGs.map(g=>`<section class="mobile-compare-group"><h3>${e(g.title)}</h3>${g.fields.map(q=>`<article class="mobile-question-card"><h4>${e(q.label)}</h4><div class="mobile-answer-list">${chs.map(ch=>{let cc=col(ch.image_color),em=firstEmoji(ch.emoji);let body=q._pair?`<div><b>名前：</b>${formatAnswer(qv(ch,q))||'<span class="muted-dash">—</span>'}</div><div style="margin-top:6px"><b>関係：</b>${formatAnswer(qv(ch,q._pair))||'<span class="muted-dash">—</span>'}</div>`:(formatAnswer(qv(ch,q))||'<span class="muted-dash">—</span>');return`<div class="mobile-answer" style="--c:${cc}"><div class="mobile-answer-head">${ch.icon_url?`<span class="mobile-answer-face" style="--c:${cc}"><img src="${e(ch.icon_url)}" alt="icon"></span>`:`<span class="mobile-answer-face" style="--c:${cc}">${e(em)}</span>`}<b>${e(ch.name||'名前未設定')}</b></div><div class="mobile-answer-body">${body}</div></div>`}).join('')}</div></article>`).join('')}</section>`).join('')}
init().catch(x=>wrap.innerHTML='<p class="note">読み込み失敗：'+e(x.message)+'</p>')
</script></body></html>
