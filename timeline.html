<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時系列</title>
<!-- v154: timeline filter popover above table -->
<link rel="stylesheet" href="./style.css?v=154">
<style>
.timeline-panel{padding:18px;position:relative;z-index:20}
.timeline-toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:13px}
.timeline-message{color:var(--muted);font-size:13px;line-height:1.7}
.timeline-mobile-hint{display:none;margin-top:8px;padding:10px 12px;border-radius:14px;background:#fff8e8;border:1px solid #ead7aa;color:#785612;font-size:12px;line-height:1.6}

.timeline-filter-panel{position:relative;z-index:5;margin-top:18px}
.timeline-filter-actions{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 12px}
.timeline-filter-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px 14px}
.timeline-filter-chip{--c:#999;display:flex;align-items:center;gap:9px;padding:6px 2px;border:0;background:transparent;font-size:13px;font-weight:850;cursor:pointer;writing-mode:horizontal-tb!important;text-orientation:mixed!important}
.timeline-filter-chip input{width:18px;height:18px;min-width:18px;min-height:18px;accent-color:var(--c);flex:0 0 auto}
.timeline-face{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--c);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);flex:0 0 auto}
.timeline-face img{width:100%;height:100%;object-fit:contain;display:block}

.timeline-shell{--lane-w:210px;--time-w:112px;overflow:auto!important;border-radius:22px;border:1px solid var(--line);box-shadow:var(--glass-shadow-soft);background:rgba(255,255,255,.78);max-height:76vh;min-height:260px;margin-top:14px;position:relative!important;z-index:1!important;isolation:isolate;contain:layout paint;-webkit-overflow-scrolling:touch}
.timeline-board{width:max-content;min-width:100%;position:relative}
.timeline-header{position:sticky;top:0;z-index:8!important;display:grid;grid-template-columns:var(--time-w) repeat(var(--lane-count), var(--lane-w));background:#f8fbff;border-bottom:1px solid #cfd8e6}
.timeline-corner{position:sticky;left:0;z-index:9!important;min-height:78px;display:grid;place-items:center;background:#f8fbff;border-right:1px solid #cfd8e6;color:var(--muted);font-size:13px;font-weight:900}
.timeline-header-char{min-height:78px;display:grid;place-items:center;gap:4px;padding:7px;border-right:1px solid #d6deea}
.timeline-header-char .timeline-face{width:38px;height:38px;border-radius:11px;font-size:19px}
.timeline-header-char b{line-height:1.1;font-size:13px;text-align:center;max-width:180px;overflow:hidden;text-overflow:ellipsis}

.timeline-row{display:grid;grid-template-columns:var(--time-w) repeat(var(--lane-count), var(--lane-w));min-height:132px;border-bottom:1px solid #cfd8e6}
.timeline-time-cell{position:sticky;left:0;z-index:6!important;display:grid;place-items:stretch;background:#fff;border-right:1px solid #cfd8e6}
.timeline-time-box{display:grid;place-items:center;min-height:100%;background:#3f86c4;color:#fff;text-align:center;font-weight:950;font-size:18px;padding:10px;line-height:1.25}

.timeline-lane-cell{--c:#999;position:relative;min-height:132px;display:grid;grid-template-rows:34px minmax(98px, auto);background:#fff;border-right:1px solid #d6deea}
.timeline-age-bar{display:grid;place-items:center;background:color-mix(in srgb,var(--c) 36%,#ffffff);border-bottom:1px solid color-mix(in srgb,var(--c) 36%,#d6deea);color:#202532;font-size:13px;font-weight:950;text-align:center}
.timeline-read-cell{min-height:98px;padding:9px 10px;background:color-mix(in srgb,var(--c) 10%,#fff);color:#243042;font-size:13px;font-weight:800;line-height:1.65;white-space:pre-wrap;overflow-wrap:anywhere;text-align:left}
.timeline-read-cell.empty{color:#a0a6b4;font-weight:800}

.timeline-edit-field{display:none;background:color-mix(in srgb,var(--c) 10%,#fff)}
.timeline-edit-field textarea{width:100%;min-height:98px;border:0;border-radius:0;padding:9px 10px;resize:vertical;background:transparent;color:#243042;font:inherit;font-size:13px;font-weight:800;line-height:1.55;text-align:left}
.timeline-edit-field textarea:focus{outline:3px solid color-mix(in srgb,var(--c) 30%,transparent);background:#fff}

body.timeline-edit-mode .timeline-read-cell{display:none}
body.timeline-edit-mode .timeline-edit-field{display:block}

.timeline-lane-cell.unborn-empty{--c:#b8bec8!important;background:#f2f4f7}
.timeline-lane-cell.unborn-empty .timeline-age-bar{background:#d9dde4!important;color:#7f8798;border-bottom-color:#cbd1db!important}
.timeline-lane-cell.unborn-empty .timeline-read-cell{background:#f5f6f8!important;color:#a0a6b4}
.timeline-lane-cell.unborn-empty .timeline-edit-field{background:#f5f6f8!important}
.timeline-lane-cell.unborn-empty textarea{color:#7f8798}
.timeline-lane-cell.unborn-filled .timeline-age-bar{background:color-mix(in srgb,var(--c) 36%,#ffffff)}
.timeline-lane-cell.unborn-filled .timeline-read-cell,.timeline-lane-cell.unborn-filled .timeline-edit-field{background:color-mix(in srgb,var(--c) 10%,#fff)}

.timeline-empty-message{padding:30px 18px;color:var(--muted);text-align:center;font-weight:850;background:rgba(255,255,255,.72)}
.timeline-save-bottom{position:sticky;bottom:0;z-index:30;margin:0;padding:12px 0 10px;background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.92) 24%,rgba(255,255,255,.96));display:flex;justify-content:center}
.timeline-save-bottom .timeline-save-box{display:grid;gap:8px;justify-items:center}
.timeline-save-bottom button{min-width:240px}
.timeline-save-hint{text-align:center;color:var(--muted);font-size:12px}

@media(max-width:900px){
  .timeline-shell{--lane-w:180px;--time-w:104px}
  .timeline-header-char b{font-size:12px}
}
@media(max-width:760px){
  .timeline-panel{padding:16px}
  .timeline-mobile-hint{display:block}
  .timeline-filter-list{grid-template-columns:1fr!important}
  .timeline-shell{--lane-w:160px;--time-w:88px;max-height:58vh!important;min-height:320px;margin-top:12px;border-radius:20px}
  .timeline-corner{min-height:70px}
  .timeline-header-char{min-height:70px;padding:6px}
  .timeline-header-char .timeline-face{width:34px;height:34px;border-radius:10px}
  .timeline-header-char b{font-size:11px}
  .timeline-row{min-height:124px}
  .timeline-time-box{font-size:15px;padding:7px}
  .timeline-lane-cell{min-height:124px;grid-template-rows:30px minmax(94px, auto)}
  .timeline-age-bar{font-size:11px}
  .timeline-read-cell,.timeline-edit-field textarea{font-size:12px;padding:8px}
  .timeline-save-bottom{padding:12px 0 calc(12px + env(safe-area-inset-bottom))}
  .timeline-save-bottom button{width:100%}
}

/* v153: filter accordion near top + narrow-window timeline stability */
.timeline-filter-accordion{
  position:relative;
  z-index:18;
  margin-top:12px;
  margin-bottom:12px;
}
.timeline-filter-toggle{
  width:min(100%, 520px);
  text-align:left;
  display:flex!important;
  justify-content:space-between;
  align-items:center;
}
.timeline-filter-toggle::after{
  content:"＋";
  font-weight:950;
}
.timeline-filter-accordion.open .timeline-filter-toggle::after{
  content:"－";
}
.timeline-filter-body-old{
  margin-top:12px;
}
.timeline-filter-body-old[hidden]{
  display:none!important;
}
.timeline-shell{
  width:100%!important;
  max-width:100%!important;
  min-width:0!important;
  display:block!important;
  overflow-x:auto!important;
  overflow-y:auto!important;
  overscroll-behavior:contain;
}
.timeline-board{
  min-width:max-content!important;
  width:max-content!important;
  display:block!important;
}
.timeline-header,
.timeline-row{
  width:max-content!important;
}
@media(max-width:760px){
  .timeline-filter-accordion{
    margin-top:10px;
  }
  .timeline-filter-toggle{
    width:100%;
  }
  .timeline-shell{
    max-height:58vh!important;
    min-height:300px!important;
  }
}


/* v154: display-character filter is a popover, not a tall panel */
.timeline-filter-popover-wrap{
  position:relative;
  z-index:50;
  margin:10px 0 12px;
  width:min(100%, 560px);
}
.timeline-filter-toggle{
  width:100%;
  text-align:left;
  display:flex!important;
  justify-content:space-between;
  align-items:center;
}
.timeline-filter-toggle::after{
  content:"＋";
  font-weight:950;
}
.timeline-filter-popover-wrap.open .timeline-filter-toggle::after{
  content:"－";
}
.timeline-filter-popover{
  position:absolute;
  left:0;
  top:calc(100% + 8px);
  width:min(720px, calc(100vw - 28px));
  max-height:min(62vh, 560px);
  overflow:auto;
  padding:16px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.92);
  background:rgba(255,255,255,.96);
  box-shadow:0 22px 54px rgba(73,82,110,.22);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.timeline-filter-popover[hidden]{
  display:none!important;
}
.timeline-filter-popover-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.timeline-filter-popover-head strong{
  font-size:18px;
  font-weight:950;
}
.timeline-filter-close{
  width:auto!important;
  min-width:0!important;
  padding:8px 12px!important;
}
.timeline-filter-list{
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr))!important;
}
.timeline-filter-chip{
  min-height:42px;
}
.timeline-shell{
  margin-top:12px!important;
  position:relative!important;
  z-index:1!important;
  display:block!important;
  width:100%!important;
  max-width:100%!important;
  min-width:0!important;
  overflow:auto!important;
}
.timeline-board{
  width:max-content!important;
  min-width:max-content!important;
}
@media(max-width:760px){
  .timeline-filter-popover-wrap{
    width:100%;
  }
  .timeline-filter-popover{
    width:100%;
    max-height:52vh;
    padding:14px;
    border-radius:20px;
  }
  .timeline-filter-list{
    grid-template-columns:1fr!important;
  }
  .timeline-filter-chip{
    min-height:44px;
  }
  .timeline-shell{
    min-height:300px!important;
    max-height:58vh!important;
  }
}

</style>

<header>
  <div class="header-inner">
    <div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div>
    <div class="header-buttons">
      <a class="header-button" href="./index.html">キャラクター</a>
      <a class="header-button" href="./compare.html">キャラQ&A</a>
      <a class="header-button" href="./stats.html">ステータス</a>
      <a class="header-button" href="./timeline.html">時系列</a>
      <a class="header-button" href="./relationship.html">相関図</a>
    </div>
  </div>
</header>

<main>
  <section class="panel timeline-panel">
    <div class="page-title-row">
      <h2>時系列</h2>
      <span class="info-wrap">
        <button class="info-button" type="button" aria-label="時系列の説明">
          <svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false">
            <path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/>
            <circle cx="600" cy="285" r="100"/>
            <rect x="500" y="430" width="200" height="520" rx="95"/>
          </svg>
        </button>
        <span class="info-pop">通常時は読むための表表示です。「編集する」を押すと全体が入力欄になり、「保存する」で表示に戻ります。</span>
      </span>
    </div>
    <div class="timeline-toolbar">
      <button class="secondary-button" onclick="loadTimeline()">再読み込み</button>
      <button class="secondary-button" id="hideEmptyYearsBtn" onclick="toggleEmptyYears()">出来事のない年を非表示</button>
      <span id="message" class="timeline-message">読み込み中...</span>
    </div>
    <div class="timeline-mobile-hint">スマホでは左右にスクロールして、各キャラの列を確認できます。</div>
  </section>


  <section class="timeline-filter-popover-wrap">
    <button class="timeline-filter-toggle secondary-button" type="button" onclick="toggleTimelineFilterPanel()">
      表示キャラクターを開く
    </button>
    <div class="timeline-filter-popover" id="timelineFilterBody" hidden>
      <div class="timeline-filter-popover-head">
        <strong>表示キャラクター</strong>
        <button class="secondary-button timeline-filter-close" type="button" onclick="toggleTimelineFilterPanel(true)">閉じる</button>
      </div>
      <div class="timeline-filter-actions">
        <button class="secondary-button" onclick="selectAllTimelineCharacters()">全員表示</button>
      </div>
      <div id="timelineCharacterFilter" class="timeline-filter-list"></div>
    </div>
  </section>

<section class="timeline-shell" id="timelineShell">
    <div class="timeline-board" id="timelineBoard"></div>
  </section>

  <section class="timeline-save-bottom">
    <div class="timeline-save-box">
      <button id="timelineEditButton" onclick="enterTimelineEditMode()">編集する</button>
      <button id="timelineSaveButton" onclick="saveTimeline()" style="display:none">時系列を保存する</button>
      <div class="timeline-save-hint" id="timelineSaveHint">閲覧モードです。編集する時は「編集する」を押してください。</div>
    </div>
  </section>
</main>

<div class="unsaved-pill">未保存の変更があります</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js?v=154"></script>
<script src="./common.js?v=154"></script>
<script>initSiteTitle();</script>

<script>
let timelineCharacters = [];
let timelineEntries = {};
let timelineEntryMeta = {};
let timelineDirtyKeys = new Set();
let selectedTimelineCharacters = new Set();
let hideEmptyYears = false;

function showTimelineMessage(text){
  const message = document.getElementById("message");
  if(message) message.textContent = text;
}

async function loadTimeline(){
  showTimelineMessage("読み込み中...");
  const teamData = await team();

  const [charactersResult, entriesResult] = await Promise.all([
    sb.from("characters")
      .select("id,name,furigana,emoji,icon_url,image_color,basic,created_at,sort_order")
      .eq("team_id", teamData.id)
      .order("sort_order", { ascending:true, nullsFirst:false })
      .order("created_at", { ascending:true }),
    sb.from("timeline_entries").select("*")
  ]);

  if(charactersResult.error) throw charactersResult.error;
  if(entriesResult.error) throw entriesResult.error;

  timelineCharacters = sortedCharacters(charactersResult.data || [])
    .map(character => ({ ...character, currentAge:getCharacterAge(character) }))
    .filter(character => Number.isFinite(character.currentAge));

  const availableIds = new Set(timelineCharacters.map(character => character.id));
  selectedTimelineCharacters = new Set([...selectedTimelineCharacters].filter(id => availableIds.has(id)));
  if(selectedTimelineCharacters.size === 0){
    selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
  }

  timelineEntries = {};
  timelineEntryMeta = {};
  timelineDirtyKeys = new Set();

  (entriesResult.data || []).forEach(row => {
    const yearsAgo = Number(row.years_ago);
    if(!timelineEntries[row.character_id]) timelineEntries[row.character_id] = {};
    if(!timelineEntryMeta[row.character_id]) timelineEntryMeta[row.character_id] = {};
    timelineEntries[row.character_id][yearsAgo] = row.text || "";
    timelineEntryMeta[row.character_id][yearsAgo] = row.updated_at || "";
  });

  clearUnsavedChanges();
  leaveTimelineEditMode();
  renderTimelineFilter();
  renderTimelineBoard();
  showTimelineMessage("読み込みました");
}

function getCharacterAge(character){
  const raw = character?.basic?.age;
  if(raw === undefined || raw === null || raw === "") return NaN;
  const number = Number(String(raw).replace(/[^\d.-]/g, ""));
  return Number.isFinite(number) ? number : NaN;
}

function buildYearList(){
  if(!timelineCharacters.length) return [];
  const maxAge = Math.max(...timelineCharacters.map(c => Number(c.currentAge) || 0));
  return Array.from({length:maxAge + 1}, (_, i) => maxAge - i);
}

function visibleTimelineCharacters(){
  return timelineCharacters.filter(character => selectedTimelineCharacters.has(character.id));
}

function timelineKey(characterId, yearsAgo){
  return `${characterId}::${yearsAgo}`;
}

function hasYearEvents(year, characters){
  return characters.some(character => String(timelineEntries?.[character.id]?.[year] || "").trim());
}

function yearLabel(year){
  return Number(year) === 0 ? "現在" : `${year}年前`;
}

function ageLabel(character, yearsAgo){
  const age = Number(character.currentAge) - Number(yearsAgo);
  return age < 0 ? "未出生" : `${age}歳`;
}

function characterFace(character){
  const color = col(character.image_color);
  if(character.icon_url){
    return `<span class="timeline-face" style="--c:${color};"><img src="${e(character.icon_url)}" alt="icon"></span>`;
  }
  return `<span class="timeline-face" style="--c:${color};">${e(firstEmoji(character.emoji))}</span>`;
}

function renderTimelineFilter(){
  const box = document.getElementById("timelineCharacterFilter");
  if(!box) return;

  if(!timelineCharacters.length){
    box.innerHTML = '<p class="note">年齢が登録されているキャラクターがまだいません。</p>';
    return;
  }

  box.innerHTML = timelineCharacters.map(character => {
    const color = col(character.image_color);
    const checked = selectedTimelineCharacters.has(character.id) ? "checked" : "";
    return `
      <label class="timeline-filter-chip" style="--c:${color};">
        <input type="checkbox" value="${character.id}" ${checked} onchange="toggleTimelineCharacter(this)">
        ${characterFace(character)}
        <span>${e(character.name || "名前未設定")}</span>
      </label>
    `;
  }).join("");
}

function toggleTimelineCharacter(input){
  if(input.checked) selectedTimelineCharacters.add(input.value);
  else selectedTimelineCharacters.delete(input.value);
  renderTimelineBoard();
}

function selectAllTimelineCharacters(){
  selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
  renderTimelineFilter();
  renderTimelineBoard();
}

function toggleEmptyYears(){
  hideEmptyYears = !hideEmptyYears;
  const button = document.getElementById("hideEmptyYearsBtn");
  if(button) button.textContent = hideEmptyYears ? "すべての年を表示" : "出来事のない年を非表示";
  renderTimelineBoard();
}

function renderTimelineBoard(){
  const board = document.getElementById("timelineBoard");
  if(!board) return;

  const characters = visibleTimelineCharacters();
  const allYears = buildYearList();
  const years = hideEmptyYears ? allYears.filter(year => hasYearEvents(year, characters)) : allYears;

  if(!timelineCharacters.length){
    board.innerHTML = '<div class="timeline-empty-message">年齢が登録されているキャラクターがまだいません。</div>';
    return;
  }
  if(!characters.length){
    board.innerHTML = '<div class="timeline-empty-message">表示するキャラクターを選んでください。</div>';
    return;
  }

  board.style.setProperty("--lane-count", characters.length);

  const header = `
    <div class="timeline-header">
      <div class="timeline-corner">時系列</div>
      ${characters.map(character => `
        <div class="timeline-header-char" style="--c:${col(character.image_color)}">
          ${characterFace(character)}
          <b>${e(character.name || "名前未設定")}</b>
        </div>
      `).join("")}
    </div>
  `;

  const rows = years.length
    ? years.map(year => renderTimelineRow(year, characters)).join("")
    : '<div class="timeline-empty-message">表示できる出来事がありません。「すべての年を表示」に戻して入力してください。</div>';

  board.innerHTML = header + rows;
}

function renderTimelineRow(year, characters){
  return `
    <div class="timeline-row" data-years-ago="${year}">
      <div class="timeline-time-cell"><div class="timeline-time-box">${e(yearLabel(year))}</div></div>
      ${characters.map(character => renderTimelineCell(character, year)).join("")}
    </div>
  `;
}

function renderTimelineCell(character, yearsAgo){
  const color = col(character.image_color);
  const text = timelineEntries?.[character.id]?.[yearsAgo] || "";
  const updatedAt = timelineEntryMeta?.[character.id]?.[yearsAgo] || "";
  const hasText = !!text.trim();
  const unborn = (Number(character.currentAge) - Number(yearsAgo)) < 0;
  const unbornClass = unborn ? (hasText ? "unborn-filled" : "unborn-empty") : "";
  const placeholder = unborn ? "未出生" : "この時期の出来事";

  return `
    <div class="timeline-lane-cell ${unbornClass}" style="--c:${color};" data-character="${character.id}" data-years-ago="${yearsAgo}">
      <div class="timeline-age-bar">${e(ageLabel(character, yearsAgo))}</div>
      <div class="timeline-read-cell ${hasText ? "" : "empty"}">${hasText ? e(text) : e(placeholder)}</div>
      <div class="timeline-edit-field">
        <textarea
          data-original="${c(text)}"
          data-updated-at="${e(updatedAt)}"
          oninput="markTimelineChanged(this)"
          placeholder="${e(placeholder)}">${e(text)}</textarea>
      </div>
    </div>
  `;
}

function enterTimelineEditMode(){
  document.body.classList.add("timeline-edit-mode");
  const editButton = document.getElementById("timelineEditButton");
  const saveButton = document.getElementById("timelineSaveButton");
  const hint = document.getElementById("timelineSaveHint");
  if(editButton) editButton.style.display = "none";
  if(saveButton) saveButton.style.display = "";
  if(hint) hint.textContent = "編集モードです。入力後は保存してください。";
}

function leaveTimelineEditMode(){
  document.body.classList.remove("timeline-edit-mode");
  const editButton = document.getElementById("timelineEditButton");
  const saveButton = document.getElementById("timelineSaveButton");
  const hint = document.getElementById("timelineSaveHint");
  if(editButton) editButton.style.display = "";
  if(saveButton) saveButton.style.display = "none";
  if(hint) hint.textContent = "閲覧モードです。編集する時は「編集する」を押してください。";
}

function markTimelineChanged(textarea){
  const box = textarea.closest("[data-character][data-years-ago]");
  if(!box) return;

  const characterId = box.dataset.character;
  const yearsAgo = Number(box.dataset.yearsAgo);
  const key = timelineKey(characterId, yearsAgo);

  textarea.dataset.dirty = "1";
  timelineDirtyKeys.add(key);

  if(!timelineEntries[characterId]) timelineEntries[characterId] = {};
  timelineEntries[characterId][yearsAgo] = textarea.value.trim();

  setUnsavedChanges(true);
  showTimelineMessage("未保存の変更があります");
}

function collectTimelineEntries(){
  const map = new Map();

  document.querySelectorAll("[data-character][data-years-ago] textarea").forEach(textarea => {
    const box = textarea.closest("[data-character][data-years-ago]");
    const characterId = box.dataset.character;
    const yearsAgo = Number(box.dataset.yearsAgo);
    const key = timelineKey(characterId, yearsAgo);

    if(!timelineDirtyKeys.has(key) && textarea.dataset.dirty !== "1") return;
    if(!characterId || !Number.isFinite(yearsAgo)) return;

    map.set(key, {
      character_id: characterId,
      years_ago: yearsAgo,
      text: textarea.value.trim(),
      original_updated_at: textarea.dataset.updatedAt || "",
      updated_at: new Date().toISOString()
    });
  });

  return [...map.values()];
}

async function assertTimelineUnchanged(rows){
  for(const row of rows){
    const {data, error} = await sb
      .from("timeline_entries")
      .select("updated_at")
      .eq("character_id", row.character_id)
      .eq("years_ago", row.years_ago)
      .maybeSingle();

    if(error) throw error;

    const known = row.original_updated_at || "";
    const current = data?.updated_at || "";

    if(known && current && !sameTimestamp(current, known)){
      throw new Error("他の人が同じ時系列セルを先に更新しています。上書きを防ぐため保存を止めました。ページを再読み込みしてください。");
    }
    if(!known && current){
      throw new Error("他の人が同じ時系列セルを先に作成しています。上書きを防ぐため保存を止めました。ページを再読み込みしてください。");
    }
  }
}

async function saveTimeline(){
  showTimelineMessage("保存中...");
  const rows = collectTimelineEntries();

  if(rows.length === 0){
    showTimelineMessage("保存する変更がありません");
    leaveTimelineEditMode();
    return;
  }

  try{
    await assertTimelineUnchanged(rows);
  }catch(error){
    console.error(error);
    showTimelineMessage(error.message);
    alert(error.message);
    return;
  }

  for(const sourceRow of rows){
    const {original_updated_at, ...row} = sourceRow;

    const existing = await sb
      .from("timeline_entries")
      .select("character_id,years_ago")
      .eq("character_id", row.character_id)
      .eq("years_ago", row.years_ago)
      .maybeSingle();

    if(existing.error){
      showTimelineMessage("保存確認に失敗しました：" + existing.error.message);
      return;
    }

    let result;
    if(existing.data){
      result = await sb
        .from("timeline_entries")
        .update({ text: row.text, updated_at: row.updated_at })
        .eq("character_id", row.character_id)
        .eq("years_ago", row.years_ago);
    }else{
      result = await sb
        .from("timeline_entries")
        .insert(row);
    }

    if(result.error){
      showTimelineMessage("保存に失敗しました：" + result.error.message);
      return;
    }
  }

  showTimelineMessage("保存しました");
  clearUnsavedChanges();
  leaveTimelineEditMode();
  await loadTimeline();
}


function toggleTimelineFilterPanel(forceClose){
  const wrap = document.querySelector(".timeline-filter-popover-wrap");
  const body = document.getElementById("timelineFilterBody");
  const button = document.querySelector(".timeline-filter-toggle");
  if(!wrap || !body || !button) return;
  const shouldClose = forceClose === true ? true : !body.hidden;
  body.hidden = shouldClose;
  wrap.classList.toggle("open", !shouldClose);
  button.textContent = shouldClose ? "表示キャラクターを開く" : "表示キャラクターを閉じる";
}

loadTimeline().catch(error => {
  console.error(error);
  showTimelineMessage("読み込みに失敗しました：" + error.message);
});
</script>
