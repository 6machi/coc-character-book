<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時系列</title>
  <link rel="stylesheet" href="./style.css?v=135">
  <style>
    .timeline-panel {
      padding: 18px;
    }

    .timeline-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin-top: 13px;
    }

    .timeline-message {
      color: var(--muted);
      font-size: 13px;
    }

    .timeline-shell {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      box-shadow: var(--glass-shadow-soft);
      background: rgba(255,255,255,.62);
      max-height: 76vh;
    }

    .timeline-shell table {
      border-collapse: separate;
      border-spacing: 0;
      width: max-content;
      min-width: 100%;
    }

    .timeline-shell th,
    .timeline-shell td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      vertical-align: top;
    }

    .timeline-shell thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(238,243,251,.98);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .timeline-corner {
      left: 0;
      z-index: 20 !important;
      min-width: 220px;
      width: 220px;
      position: sticky !important;
      background: rgba(232,238,248,.98) !important;
      padding: 10px;
      text-align: left;
    }

    .timeline-year-head {
      min-width: 168px;
      width: 168px;
      padding: 8px;
      text-align: center;
    }

    .timeline-year-main {
      display: block;
      font-weight: 900;
      font-size: 15px;
    }

    .timeline-char-col {
      position: sticky;
      left: 0;
      z-index: 6;
      min-width: 220px;
      width: 220px;
      background: rgba(255,255,255,.98) !important;
      padding: 10px;
    }

    .timeline-char {
      --c: #999;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: center;
    }

    .timeline-emoji {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--c);
      border: 1px solid rgba(255,255,255,.9);
      overflow: hidden;
    }

    .timeline-emoji img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .timeline-small {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .timeline-cell {
      --c: #999;
      width: 168px;
      min-width: 168px;
      padding: 0;
      background: #fff;
    }

    .timeline-cell-inner {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 128px;
    }

    .timeline-age-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 5px 8px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--c) 12%, #f1f4f8), #f5f7fa);
      color: #3d4452;
      font-weight: bold;
      font-size: 12px;
      border-bottom: 1px solid var(--line);
    }

    .timeline-age-line .relative {
      color: #788194;
      font-weight: normal;
      font-size: 11px;
    }

    .timeline-cell textarea {
      width: 100%;
      min-height: 96px;
      height: 100%;
      resize: vertical;
      border: none;
      border-radius: 0;
      background: rgba(255,255,255,.92);
      padding: 8px;
      font-size: 12px;
      font-family: inherit;
      line-height: 1.55;
      color: var(--text);
    }

    .timeline-cell textarea:focus {
      outline: 2px solid color-mix(in srgb, var(--c) 30%, #b7c3db);
      outline-offset: -2px;
      background: #fff;
    }

    .timeline-unborn {
      opacity: .38;
    }

    .timeline-unborn textarea {
      background: #f8f9fb;
    }

    .timeline-empty-soft .timeline-empty-cell textarea,
    .timeline-empty-soft .timeline-empty-cell .timeline-age-line {
      opacity: .32;
    }

    .timeline-compact .timeline-cell,
    .timeline-compact .timeline-year-head {
      min-width: 145px;
      width: 145px;
    }

    .timeline-compact textarea {
      min-height: 66px;
    }

    @media(max-width: 820px) {
      .timeline-corner,
      .timeline-char-col {
        min-width: 165px;
        width: 165px;
      }

      .timeline-year-head,
      .timeline-cell {
        min-width: 148px;
        width: 148px;
      }
    }
  
    .timeline-char-col{
      min-width:170px !important;
      width:170px !important;
      padding:6px 8px !important;
    }
    .timeline-corner{
      min-width:170px !important;
      width:170px !important;
    }
    .timeline-char-simple{
      --c:#999;
      display:grid;
      gap:4px;
      border-left:4px solid var(--c);
      padding-left:8px;
      min-height:34px;
      align-content:center;
    }
    .timeline-char-simple b{
      font-size:13px;
      line-height:1.3;
    }
    .timeline-char-simple span{
      color:var(--muted);
      font-size:11px;
      line-height:1.2;
    }
    .timeline-cell-inner{
      min-height:96px !important;
    }
    .timeline-cell textarea{
      min-height:66px !important;
    }
    .timeline-cell,.timeline-year-head{
      min-width:150px !important;
      width:150px !important;
    }
    .timeline-age-line{
      min-height:24px !important;
      padding:4px 7px !important;
    }

  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div>
      <div class="header-buttons">
        <a class="header-button" href="./index.html">キャラクター</a>
        <a class="header-button" href="./compare.html">キャラQ&A</a>
        <a class="header-button" href="./stats.html">ステータス</a>
        <a class="header-button" href="./timeline.html">時系列</a><a class="header-button" href="./relationship.html">相関図</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel timeline-panel">
      <div class="page-title-row"><h2>時系列</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="時系列の説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop">年表<br>キャラクターの年齢をもとに「〇〇年前」を自動表示します。<br>各セルには出来事を直接入力できます。<br>キャラクターを追加・編集した後は、「読み込み」ボタンで最新情報を反映してください。</span></span></div>
      <div class="timeline-toolbar">
        <button onclick="saveTimeline()">保存する</button>
        <button class="secondary-button" onclick="toggleEmpty()">空欄を薄くする/戻す</button>
        <button class="secondary-button" onclick="toggleCompact()">コンパクト/標準</button>
        <button class="secondary-button" onclick="loadTimeline()">再読み込み</button>
        <span id="message" class="timeline-message">読み込み中...</span>
      </div>
    </section>

    <section class="panel timeline-filter-panel">
      <div class="page-title-row"><h2>表示キャラクター</h2></div>
      <div class="timeline-filter-actions">
        <button class="secondary-button" onclick="selectAllTimelineCharacters()">全員表示</button>
        <button class="secondary-button" onclick="clearTimelineCharacters()">全員非表示</button>
      </div>
      <div id="timelineCharacterFilter" class="timeline-filter-list"></div>
    </section>

    <section class="timeline-shell" id="timelineShell">
      <table id="timelineTable"></table>
    </section>

    <section class="timeline-mobile-list" id="timelineMobileList"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=135"></script>
  <script src="./common.js?v=135"></script>
  <script>initSiteTitle();</script>

  <script>
    let timelineCharacters = [];
    let timelineEntries = {};
    let selectedTimelineCharacters = new Set();

    async function loadTimeline() {
      document.getElementById("message").textContent = "読み込み中...";

      const teamData = await team();

      const [charactersResult, entriesResult] = await Promise.all([
        sb
          .from("characters")
          .select("id,name,furigana,emoji,icon_url,image_color,basic,created_at,sort_order")
          .eq("team_id", teamData.id)
          .order("sort_order", { ascending: true, nullsFirst:false })
          .order("created_at", { ascending: true }),
        sb
          .from("timeline_entries")
          .select("*")
      ]);

      if (charactersResult.error) throw charactersResult.error;
      if (entriesResult.error) throw entriesResult.error;

      timelineCharacters = sortedCharacters(charactersResult.data || [])
        .map(character => ({
          ...character,
          currentAge: getCharacterAge(character)
        }))
        .filter(character => Number.isFinite(character.currentAge));

      const availableIds = new Set(timelineCharacters.map(character => character.id));
      selectedTimelineCharacters = new Set([...selectedTimelineCharacters].filter(id => availableIds.has(id)));
      if(selectedTimelineCharacters.size === 0){
        selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
      }

      timelineEntries = {};
      (entriesResult.data || []).forEach(row => {
        if (!timelineEntries[row.character_id]) timelineEntries[row.character_id] = {};
        timelineEntries[row.character_id][row.years_ago] = row.text || "";
      });

      renderTimelineFilter();
      renderTimelineTable();
      document.getElementById("message").textContent = "読み込みました";
    }

    function getCharacterAge(character) {
      const raw = character?.basic?.age;
      if (raw === undefined || raw === null || raw === "") return NaN;
      const number = Number(String(raw).replace(/[^\d.-]/g, ""));
      return Number.isFinite(number) ? number : NaN;
    }

    function visibleTimelineCharacters() {
      return timelineCharacters.filter(character => selectedTimelineCharacters.has(character.id));
    }

    function years() {
      const visible = visibleTimelineCharacters();
      const max = Math.max(...visible.map(character => character.currentAge || 0), 0);
      const list = [];

      for (let year = max; year >= 0; year--) {
        list.push(year);
      }

      return list;
    }

    function renderTimelineTable() {
      const table = document.getElementById("timelineTable");

      const visibleCharacters = visibleTimelineCharacters();

      if (timelineCharacters.length === 0) {
        table.innerHTML = `
          <tbody>
            <tr>
              <td style="padding:18px;">年齢が登録されているキャラクターがまだいません。</td>
            </tr>
          </tbody>
        `;
        document.getElementById("timelineMobileList").innerHTML = '<div class="timeline-mobile-empty">年齢が登録されているキャラクターがまだいません。</div>';
        return;
      }

      if (visibleCharacters.length === 0) {
        table.innerHTML = `
          <tbody>
            <tr>
              <td style="padding:18px;">表示するキャラクターを選択してください。</td>
            </tr>
          </tbody>
        `;
        document.getElementById("timelineMobileList").innerHTML = '<div class="timeline-mobile-empty">表示するキャラクターを選択してください。</div>';
        return;
      }

      const yearList = years();

      const head = `
        <thead>
          <tr>
            <th class="timeline-corner">名前</th>
            ${yearList.map(year => `
              <th class="timeline-year-head">
                <span class="timeline-year-main">${year}年前</span>
              </th>
            `).join("")}
          </tr>
        </thead>
      `;

      const body = `
        <tbody>
          ${visibleCharacters.map(character => renderCharacterRow(character, yearList)).join("")}
        </tbody>
      `;

      table.innerHTML = head + body;
      renderMobileTimeline(yearList, visibleCharacters);
    }

    function renderCharacterRow(character, yearList) {
      const color = col(character.image_color);

      return `
        <tr>
          <th class="timeline-char-col">
            <div class="timeline-char-simple" style="--c:${color};">
              <b>${e(character.name || "名前未設定")}</b>
              <span>現在年齢：${character.currentAge}歳</span>
            </div>
          </th>
          ${yearList.map(year => renderCell(character, year, color)).join("")}
        </tr>
      `;
    }

    function renderCell(character, yearsAgo, color) {
      const age = character.currentAge - yearsAgo;
      const isUnborn = age < 0;
      const ageLabel = isUnborn ? "未出生" : `${age}歳`;
      const text = timelineEntries?.[character.id]?.[yearsAgo] || "";
      const emptyClass = text.trim() ? "" : "timeline-empty-cell";

      return `
        <td class="timeline-cell ${isUnborn ? "timeline-unborn" : ""} ${emptyClass}" style="--c:${color};" data-character="${character.id}" data-years-ago="${yearsAgo}">
          <div class="timeline-cell-inner">
            <div class="timeline-age-line">
              <span>${ageLabel}</span>
              <span class="relative">${yearsAgo}年前</span>
            </div>
            <textarea placeholder="${isUnborn ? "未出生" : "この時期の出来事"}">${e(text)}</textarea>
          </div>
        </td>
      `;
    }

    function collectTimelineEntries() {
      const rows = [];

      document.querySelectorAll(".timeline-cell").forEach(cell => {
        const characterId = cell.dataset.character;
        const yearsAgo = Number(cell.dataset.yearsAgo);
        const text = cell.querySelector("textarea").value.trim();

        if (!characterId || !Number.isFinite(yearsAgo)) return;

        rows.push({
          character_id: characterId,
          years_ago: yearsAgo,
          text,
          updated_at: new Date().toISOString()
        });
      });

      return rows;
    }

    async function saveTimeline() {
      document.getElementById("message").textContent = "保存中...";

      collectMobileTimelineEntries();
      const rows = collectTimelineEntries();

      if (rows.length === 0) {
        document.getElementById("message").textContent = "保存する行がありません";
        return;
      }

      const { error } = await sb
        .from("timeline_entries")
        .upsert(rows, { onConflict: "character_id,years_ago" });

      if (error) {
        console.error(error);
        document.getElementById("message").textContent = "保存に失敗しました：" + error.message;
        return;
      }

      document.getElementById("message").textContent = "保存しました";
      await loadTimeline();
    }

    function toggleEmpty() {
      document.body.classList.toggle("timeline-empty-soft");
    }

    function toggleCompact() {
      document.getElementById("timelineShell").classList.toggle("timeline-compact");
    }

    
    function renderTimelineFilter() {
      const box = document.getElementById("timelineCharacterFilter");
      if(!box) return;

      if(!timelineCharacters.length){
        box.innerHTML = '<p class="note">年齢が登録されているキャラクターがまだいません。</p>';
        return;
      }

      box.innerHTML = timelineCharacters.map(character => {
        const color = col(character.image_color);
        const checked = selectedTimelineCharacters.has(character.id) ? "checked" : "";
        const face = character.icon_url
          ? `<span class="timeline-filter-face" style="--c:${color};"><img src="${e(character.icon_url)}" alt="icon"></span>`
          : `<span class="timeline-filter-face" style="--c:${color};">${e(firstEmoji(character.emoji))}</span>`;

        return `
          <label class="timeline-filter-chip" style="--c:${color};">
            <input type="checkbox" value="${character.id}" ${checked} onchange="toggleTimelineCharacter(this)">
            ${face}
            <span>${e(character.name || "名前未設定")}</span>
          </label>
        `;
      }).join("");
    }

    function toggleTimelineCharacter(input){
      if(input.checked) selectedTimelineCharacters.add(input.value);
      else selectedTimelineCharacters.delete(input.value);
      renderTimelineTable();
    }

    function selectAllTimelineCharacters(){
      selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
      renderTimelineFilter();
      renderTimelineTable();
    }

    function clearTimelineCharacters(){
      selectedTimelineCharacters = new Set();
      renderTimelineFilter();
      renderTimelineTable();
    }


    function renderMobileTimeline(yearList, visibleCharacters) {
      const box = document.getElementById("timelineMobileList");
      if(!box) return;

      box.innerHTML = yearList.map(year => {
        const cards = visibleCharacters.map(character => {
          const color = col(character.image_color);
          const age = character.currentAge - year;
          const isUnborn = age < 0;
          const ageLabel = isUnborn ? "未出生" : `${age}歳`;
          const text = timelineEntries?.[character.id]?.[year] || "";
          const face = character.icon_url
            ? `<span class="timeline-mobile-face" style="--c:${color};"><img src="${e(character.icon_url)}" alt="icon"></span>`
            : `<span class="timeline-mobile-face" style="--c:${color};">${e(firstEmoji(character.emoji))}</span>`;

          return `
            <div class="timeline-mobile-card ${isUnborn ? "is-unborn" : ""}" style="--c:${color};" data-character="${character.id}" data-years-ago="${year}">
              <div class="timeline-mobile-card-head">
                ${face}
                <div>
                  <b>${e(character.name || "名前未設定")}</b>
                  <span>${ageLabel}</span>
                </div>
              </div>
              <textarea placeholder="${isUnborn ? "未出生" : "この時期の出来事"}">${e(text)}</textarea>
            </div>
          `;
        }).join("");

        return `
          <div class="timeline-mobile-year">
            <div class="timeline-mobile-year-title">${year}年前</div>
            <div class="timeline-mobile-year-cards">${cards}</div>
          </div>
        `;
      }).join("");
    }

    function collectMobileTimelineEntries(){
      document.querySelectorAll(".timeline-mobile-card").forEach(card => {
        const characterId = card.dataset.character;
        const yearsAgo = Number(card.dataset.yearsAgo);
        const text = card.querySelector("textarea").value.trim();

        if(!timelineEntries[characterId]) timelineEntries[characterId] = {};
        timelineEntries[characterId][yearsAgo] = text;
      });
    }

loadTimeline().catch(error => {
      console.error(error);
      document.getElementById("message").textContent = "読み込みに失敗しました：" + error.message;
    });
  </script>
</body>
</html>
