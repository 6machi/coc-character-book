<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時系列</title>
<!-- v162: mobile hide empty character cells -->
<link rel="stylesheet" href="./style.css?v=162">
<style>
.timeline-panel{
  padding:18px;
}
.timeline-toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  align-items:center;
  margin-top:13px;
}
.timeline-message{
  color:var(--muted);
  font-size:13px;
  line-height:1.7;
}

/* 表示キャラクター */
.timeline-filter-panel{
  margin:12px 0;
  padding:16px 18px!important;
}
.timeline-filter-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0 12px;
}
.timeline-filter-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:8px 14px;
}
.timeline-filter-chip{
  --c:#999;
  display:flex!important;
  flex-direction:row!important;
  align-items:center!important;
  gap:9px;
  min-height:40px;
  padding:4px 2px;
  border:0;
  background:transparent;
  font-size:13px;
  font-weight:850;
  cursor:pointer;
  writing-mode:horizontal-tb!important;
  text-orientation:mixed!important;
}
.timeline-filter-chip input{
  width:18px!important;
  height:18px!important;
  min-width:18px!important;
  min-height:18px!important;
  flex:0 0 18px!important;
  accent-color:var(--c);
}
.timeline-face{
  width:30px;
  height:30px;
  border-radius:9px;
  display:grid;
  place-items:center;
  background:var(--c);
  overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);
  flex:0 0 auto;
}
.timeline-face img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

/* 表の左上に置く編集/保存 */
.timeline-table-actions{
  margin:14px 0 8px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px;
}
.timeline-table-actions button{
  min-width:160px;
}
.timeline-save-hint{
  color:var(--muted);
  font-size:12px;
}

/* SVG年表 */
.timeline-svg-shell{
  display:block!important;
  width:100%!important;
  max-width:100%!important;
  min-width:0!important;
  overflow:auto!important;
  -webkit-overflow-scrolling:touch;
  border-radius:22px;
  border:1px solid var(--line);
  box-shadow:var(--glass-shadow-soft);
  background:rgba(255,255,255,.82);
  margin:0 0 18px;
  padding:12px;
}
.timeline-svg-wrap{
  width:max-content;
  min-width:100%;
}
.timeline-svg-wrap svg{
  display:block;
  background:#fff;
  border-radius:12px;
}
.timeline-empty-message{
  padding:30px 18px;
  color:var(--muted);
  text-align:center;
  font-weight:850;
  background:rgba(255,255,255,.72);
  border-radius:14px;
}

/* スマホ縦表示 */
.timeline-mobile-wrap{
  display:none;
}
.timeline-mobile-year{
  background:rgba(255,255,255,.86);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--glass-shadow-soft);
  overflow:hidden;
  margin:0 0 14px;
}
.timeline-mobile-year-title{
  background:#3f86c4;
  color:#fff;
  font-size:20px;
  font-weight:950;
  padding:14px 12px;
}
.timeline-mobile-cell{
  --c:#999;
  border-bottom:1px solid #d6deea;
  background:#fff;
}
.timeline-mobile-cell:last-child{
  border-bottom:0;
}
.timeline-mobile-character{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  background:color-mix(in srgb,var(--c) 28%,#ffffff);
  border-bottom:1px solid color-mix(in srgb,var(--c) 36%,#d6deea);
  font-size:13px;
  font-weight:950;
}
.timeline-mobile-character .timeline-face{
  width:26px;
  height:26px;
  border-radius:8px;
}
.timeline-mobile-age{
  margin-left:auto;
  color:#202532;
  font-weight:950;
}
.timeline-mobile-text{
  padding:10px 12px;
  font-size:13px;
  font-weight:800;
  line-height:1.65;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  background:color-mix(in srgb,var(--c) 8%,#fff);
}
.timeline-mobile-text.empty{
  color:#c4cad5;
  background:#fbfcff;
}
.timeline-mobile-cell.unborn-empty{
  background:#f2f4f7;
}
.timeline-mobile-cell.unborn-empty .timeline-mobile-character{
  background:#d9dde4;
  color:#7f8798;
  border-bottom-color:#cbd1db;
}
.timeline-mobile-cell.unborn-empty .timeline-mobile-text{
  background:#f5f6f8;
  color:#a0a6b4;
}
.timeline-mobile-cell textarea{
  width:100%;
  min-height:92px;
  border:0;
  resize:vertical;
  padding:10px 12px;
  background:color-mix(in srgb,var(--c) 8%,#fff);
  color:#243042;
  font:800 13px -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  line-height:1.55;
  box-sizing:border-box;
}

.mobile-only-control{
  display:none!important;
}
@media(max-width:760px){
  .mobile-only-control{
    display:inline-flex!important;
  }
  .timeline-panel{
    padding:16px;
  }
  .timeline-filter-list{
    grid-template-columns:1fr!important;
  }
  .timeline-svg-shell{
    display:none!important;
  }
  .timeline-mobile-wrap{
    display:block;
  }
  .timeline-table-actions{
    position:sticky;
    top:0;
    z-index:20;
    padding:8px 0;
    background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,255,255,.9));
  }
  .timeline-table-actions button{
    width:100%;
  }
}
</style>
</head>

<body>
<header>
  <div class="header-inner">
    <div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div>
    <div class="header-buttons">
      <a class="header-button" href="./index.html">キャラクター</a>
      <a class="header-button" href="./compare.html">キャラQ&A</a>
      <a class="header-button" href="./stats.html">ステータス</a>
      <a class="header-button" href="./timeline.html">時系列</a>
      <a class="header-button" href="./relationship.html">相関図</a>
    </div>
  </div>
</header>

<main>
  <section class="panel timeline-panel">
    <div class="page-title-row">
      <h2>時系列</h2>
      <span class="info-wrap">
        <button class="info-button" type="button" aria-label="時系列の説明">
          <svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false">
            <path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/>
            <circle cx="600" cy="285" r="100"/>
            <rect x="500" y="430" width="200" height="520" rx="95"/>
          </svg>
        </button>
        <span class="info-pop">
          ・表示／非表示で確認したいキャラの年表だけ確認できます<br>
          ・編集→保存で内容が記録されます<br>
          ・未出生でグレーアウトされたところにも出来事を記載できます<br>
          ・キャラカードから年齢を自動算出しています<br>
          ・スマホでみると縦表記になります、表で確認したい場合はPC推奨<br>
          ・スマホでは未出生／出来事なしのキャラを非表示にできます
        </span>
      </span>
    </div>
    <div class="timeline-toolbar">
      <button class="secondary-button" onclick="loadTimeline()">再読み込み</button>
      <button class="secondary-button" id="hideEmptyYearsBtn" onclick="toggleEmptyYears()">出来事のない年を非表示</button>
      <button class="secondary-button mobile-only-control" id="hideMobileEmptyCharactersBtn" onclick="toggleMobileEmptyCharacters()">未出生・出来事なしを非表示</button>
      <span id="message" class="timeline-message">読み込み中...</span>
    </div>
  </section>

  <section class="panel timeline-filter-panel">
    <div class="page-title-row"><h2>表示キャラクター</h2></div>
    <div class="timeline-filter-actions">
      <button class="secondary-button" onclick="selectAllTimelineCharacters()">全員表示</button>
    </div>
    <div id="timelineCharacterFilter" class="timeline-filter-list"></div>
  </section>

  <section class="timeline-table-actions">
    <button id="timelineEditButton" onclick="enterTimelineEditMode()">編集する</button>
    <button id="timelineSaveButton" onclick="saveTimeline()" style="display:none">時系列を保存する</button>
    <div class="timeline-save-hint" id="timelineSaveHint">閲覧モードです。編集する時は「編集する」を押してください。</div>
  </section>

  <section class="timeline-svg-shell">
    <div class="timeline-svg-wrap" id="timelineSvgWrap"></div>
  </section>

  <section class="timeline-mobile-wrap" id="timelineMobileWrap"></section>
</main>

<div class="unsaved-pill">未保存の変更があります</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js?v=162"></script>
<script src="./common.js?v=162"></script>
<script>initSiteTitle();</script>

<script>
let timelineCharacters = [];
let timelineEntries = {};
let timelineEntryMeta = {};
let timelineDirtyKeys = new Set();
let selectedTimelineCharacters = new Set();
let hideEmptyYears = false;
let hideMobileEmptyCharacters = false;
let timelineEditMode = false;

const timelineLayout = {
  timeW: 110,
  colW: 210,
  headerH: 96,
  minRowH: 92,
  padding: 10,
  ageH: 28,
  fontSize: 13,
  lineH: 18
};

function showTimelineMessage(text){
  const message = document.getElementById("message");
  if(message) message.textContent = text;
}

async function loadTimeline(){
  showTimelineMessage("読み込み中...");
  const teamData = await team();

  const [charactersResult, entriesResult] = await Promise.all([
    sb.from("characters")
      .select("id,name,furigana,emoji,icon_url,image_color,basic,created_at,sort_order")
      .eq("team_id", teamData.id)
      .order("sort_order", { ascending:true, nullsFirst:false })
      .order("created_at", { ascending:true }),
    sb.from("timeline_entries").select("*")
  ]);

  if(charactersResult.error) throw charactersResult.error;
  if(entriesResult.error) throw entriesResult.error;

  timelineCharacters = sortedCharacters(charactersResult.data || [])
    .map(character => ({ ...character, currentAge:getCharacterAge(character) }))
    .filter(character => Number.isFinite(character.currentAge));

  const availableIds = new Set(timelineCharacters.map(character => character.id));
  selectedTimelineCharacters = new Set([...selectedTimelineCharacters].filter(id => availableIds.has(id)));
  if(selectedTimelineCharacters.size === 0){
    selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
  }

  timelineEntries = {};
  timelineEntryMeta = {};
  timelineDirtyKeys = new Set();

  (entriesResult.data || []).forEach(row => {
    const yearsAgo = Number(row.years_ago);
    if(!timelineEntries[row.character_id]) timelineEntries[row.character_id] = {};
    if(!timelineEntryMeta[row.character_id]) timelineEntryMeta[row.character_id] = {};
    timelineEntries[row.character_id][yearsAgo] = row.text || "";
    timelineEntryMeta[row.character_id][yearsAgo] = row.updated_at || "";
  });

  clearUnsavedChanges();
  leaveTimelineEditMode(false);
  renderTimelineFilter();
  renderTimelineViews();
  showTimelineMessage("読み込みました");
}

function getCharacterAge(character){
  const raw = character?.basic?.age;
  if(raw === undefined || raw === null || raw === "") return NaN;
  const number = Number(String(raw).replace(/[^\d.-]/g, ""));
  return Number.isFinite(number) ? number : NaN;
}

function visibleTimelineCharacters(){
  return timelineCharacters.filter(character => selectedTimelineCharacters.has(character.id));
}

function buildYearList(){
  if(!timelineCharacters.length) return [];
  const maxAge = Math.max(...timelineCharacters.map(c => Number(c.currentAge) || 0));
  return Array.from({length:maxAge + 1}, (_, i) => maxAge - i);
}

function hasYearEvents(year, characters){
  return characters.some(character => String(timelineEntries?.[character.id]?.[year] || "").trim());
}

function timelineYears(characters){
  const allYears = buildYearList();
  return hideEmptyYears ? allYears.filter(year => hasYearEvents(year, characters)) : allYears;
}

function yearLabel(year){
  return Number(year) === 0 ? "現在" : `${year}年前`;
}

function ageLabel(character, yearsAgo){
  const age = Number(character.currentAge) - Number(yearsAgo);
  return age < 0 ? "未出生" : `${age}歳`;
}

function timelineKey(characterId, yearsAgo){
  return `${characterId}::${yearsAgo}`;
}

function characterColor(character){
  return col(character.image_color);
}

function characterEmoji(character){
  return firstEmoji(character.emoji);
}

function characterFace(character){
  const color = characterColor(character);
  if(character.icon_url){
    return `<span class="timeline-face" style="--c:${color};"><img src="${e(character.icon_url)}" alt="icon"></span>`;
  }
  return `<span class="timeline-face" style="--c:${color};">${e(characterEmoji(character))}</span>`;
}

function renderTimelineFilter(){
  const box = document.getElementById("timelineCharacterFilter");
  if(!box) return;

  if(!timelineCharacters.length){
    box.innerHTML = '<p class="note">年齢が登録されているキャラクターがまだいません。</p>';
    return;
  }

  box.innerHTML = timelineCharacters.map(character => {
    const color = characterColor(character);
    const checked = selectedTimelineCharacters.has(character.id) ? "checked" : "";
    return `
      <label class="timeline-filter-chip" style="--c:${color};">
        <input type="checkbox" value="${character.id}" ${checked} onchange="toggleTimelineCharacter(this)">
        ${characterFace(character)}
        <span>${e(character.name || "名前未設定")}</span>
      </label>
    `;
  }).join("");
}

function toggleTimelineCharacter(input){
  if(input.checked) selectedTimelineCharacters.add(input.value);
  else selectedTimelineCharacters.delete(input.value);
  renderTimelineViews();
}

function selectAllTimelineCharacters(){
  selectedTimelineCharacters = new Set(timelineCharacters.map(character => character.id));
  renderTimelineFilter();
  renderTimelineViews();
}

function toggleEmptyYears(){
  hideEmptyYears = !hideEmptyYears;
  const button = document.getElementById("hideEmptyYearsBtn");
  if(button) button.textContent = hideEmptyYears ? "すべての年を表示" : "出来事のない年を非表示";
  renderTimelineViews();
}

function toggleMobileEmptyCharacters(){
  hideMobileEmptyCharacters = !hideMobileEmptyCharacters;
  const button = document.getElementById("hideMobileEmptyCharactersBtn");
  if(button) button.textContent = hideMobileEmptyCharacters ? "未記入キャラも表示" : "未出生・出来事なしを非表示";
  renderTimelineMobile();
}

function hexToRgb(hex){
  hex = String(hex || "#999999").replace("#","");
  if(hex.length === 3) hex = hex.split("").map(x => x + x).join("");
  const n = parseInt(hex, 16);
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}

function mixColor(hex, amount){
  const rgb = hexToRgb(hex);
  const r = Math.round(rgb.r * amount + 255 * (1 - amount));
  const g = Math.round(rgb.g * amount + 255 * (1 - amount));
  const b = Math.round(rgb.b * amount + 255 * (1 - amount));
  return `rgb(${r},${g},${b})`;
}

function svgEsc(value){
  return String(value ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function wrapText(text, maxChars){
  const raw = String(text || "");
  const lines = [];
  raw.split("\n").forEach(part => {
    let s = part;
    if(s.length === 0){
      lines.push("");
      return;
    }
    while(s.length > maxChars){
      lines.push(s.slice(0, maxChars));
      s = s.slice(maxChars);
    }
    lines.push(s);
  });
  return lines.length ? lines : [""];
}

function calcTimelineRows(characters, years){
  return years.map(year => {
    let maxLines = 1;
    characters.forEach(character => {
      const text = timelineEntries?.[character.id]?.[year] || "";
      const unborn = Number(character.currentAge) - Number(year) < 0;
      const placeholder = unborn ? "未出生" : "この時期の出来事";
      const display = text.trim() || placeholder;
      const lines = wrapText(display, 15);
      maxLines = Math.max(maxLines, lines.length);
    });
    const height = Math.max(
      timelineLayout.minRowH,
      timelineLayout.ageH + timelineLayout.padding * 2 + maxLines * timelineLayout.lineH + 8
    );
    return {year, height};
  });
}

function renderTimelineViews(){
  renderTimelineSvg();
  renderTimelineMobile();
}

function currentTimelineData(){
  const characters = visibleTimelineCharacters();
  const years = timelineYears(characters);
  return {characters, years};
}

function renderTimelineSvg(){
  const wrap = document.getElementById("timelineSvgWrap");
  const {characters, years} = currentTimelineData();

  if(!timelineCharacters.length){
    wrap.innerHTML = '<div class="timeline-empty-message">年齢が登録されているキャラクターがまだいません。</div>';
    return;
  }

  if(!characters.length){
    wrap.innerHTML = '<div class="timeline-empty-message">表示するキャラクターを選んでください。</div>';
    return;
  }

  if(!years.length){
    wrap.innerHTML = '<div class="timeline-empty-message">表示できる出来事がありません。「すべての年を表示」に戻して入力してください。</div>';
    return;
  }

  const rows = calcTimelineRows(characters, years);
  const width = timelineLayout.timeW + characters.length * timelineLayout.colW;
  const height = timelineLayout.headerH + rows.reduce((sum, row) => sum + row.height, 0);

  let svg = `
  <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"/>
  `;

  svg += `
    <rect x="0" y="0" width="${timelineLayout.timeW}" height="${timelineLayout.headerH}" fill="#f8fbff" stroke="#cfd8e6"/>
    <text x="${timelineLayout.timeW / 2}" y="${timelineLayout.headerH / 2 + 5}" text-anchor="middle" font-size="13" font-weight="900" fill="#7f8798">時系列</text>
  `;

  characters.forEach((character, index) => {
    const x = timelineLayout.timeW + index * timelineLayout.colW;
    const color = characterColor(character);
    const emoji = characterEmoji(character);
    svg += `<rect x="${x}" y="0" width="${timelineLayout.colW}" height="${timelineLayout.headerH}" fill="#f8fbff" stroke="#d6deea"/>`;
    svg += `<circle cx="${x + timelineLayout.colW / 2}" cy="32" r="20" fill="${svgEsc(color)}"/>`;
    svg += `<text x="${x + timelineLayout.colW / 2}" y="39" text-anchor="middle" font-size="18">${svgEsc(emoji)}</text>`;
    const nameLines = wrapText(character.name || "名前未設定", 12);
    nameLines.slice(0, 2).forEach((line, lineIndex) => {
      svg += `<text x="${x + timelineLayout.colW / 2}" y="${66 + lineIndex * 15}" text-anchor="middle" font-size="12" font-weight="900" fill="#202532">${svgEsc(line)}</text>`;
    });
  });

  let y = timelineLayout.headerH;
  rows.forEach(row => {
    const year = row.year;
    const rowHeight = row.height;

    svg += `<rect x="0" y="${y}" width="${timelineLayout.timeW}" height="${rowHeight}" fill="#3f86c4" stroke="#cfd8e6"/>`;
    svg += `<text x="${timelineLayout.timeW / 2}" y="${y + rowHeight / 2 + 6}" text-anchor="middle" font-size="18" font-weight="950" fill="#ffffff">${svgEsc(yearLabel(year))}</text>`;

    characters.forEach((character, index) => {
      const x = timelineLayout.timeW + index * timelineLayout.colW;
      const color = characterColor(character);
      const text = timelineEntries?.[character.id]?.[year] || "";
      const updatedAt = timelineEntryMeta?.[character.id]?.[year] || "";
      const hasText = !!text.trim();
      const unborn = Number(character.currentAge) - Number(year) < 0;
      const placeholder = unborn ? "未出生" : "この時期の出来事";
      const display = hasText ? text : placeholder;

      let ageFill, cellFill, textFill;
      if(unborn && !hasText){
        ageFill = "#d9dde4";
        cellFill = "#f5f6f8";
        textFill = "#a0a6b4";
      }else if(!hasText){
        ageFill = mixColor(color, .22);
        cellFill = "#fbfcff";
        textFill = "#c4cad5";
      }else{
        ageFill = mixColor(color, .36);
        cellFill = mixColor(color, .10);
        textFill = "#243042";
      }

      svg += `<rect x="${x}" y="${y}" width="${timelineLayout.colW}" height="${rowHeight}" fill="#ffffff" stroke="#d6deea"/>`;
      svg += `<rect x="${x}" y="${y}" width="${timelineLayout.colW}" height="${timelineLayout.ageH}" fill="${svgEsc(ageFill)}" stroke="#d6deea"/>`;
      svg += `<text x="${x + timelineLayout.colW / 2}" y="${y + 19}" text-anchor="middle" font-size="13" font-weight="950" fill="#202532">${svgEsc(ageLabel(character, year))}</text>`;

      if(timelineEditMode){
        svg += `<foreignObject x="${x}" y="${y + timelineLayout.ageH}" width="${timelineLayout.colW}" height="${rowHeight - timelineLayout.ageH}">
          <textarea xmlns="http://www.w3.org/1999/xhtml"
            data-character="${svgEsc(character.id)}"
            data-years-ago="${year}"
            data-original="${c(text)}"
            data-updated-at="${e(updatedAt)}"
            oninput="markTimelineChanged(this)"
            placeholder="${svgEsc(placeholder)}"
            style="width:100%;height:100%;border:0;padding:9px 10px;resize:none;background:${cellFill};font:800 13px -apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;line-height:1.55;color:#243042;box-sizing:border-box;">${svgEsc(text)}</textarea>
        </foreignObject>`;
      }else{
        svg += `<rect x="${x}" y="${y + timelineLayout.ageH}" width="${timelineLayout.colW}" height="${rowHeight - timelineLayout.ageH}" fill="${svgEsc(cellFill)}"/>`;
        const lines = wrapText(display, 15);
        lines.forEach((line, lineIndex) => {
          const textY = y + timelineLayout.ageH + 18 + lineIndex * timelineLayout.lineH;
          if(textY < y + rowHeight - 8){
            svg += `<text x="${x + 10}" y="${textY}" font-size="13" font-weight="800" fill="${svgEsc(textFill)}">${svgEsc(line)}</text>`;
          }
        });
      }
    });

    y += rowHeight;
  });

  svg += "</svg>";
  wrap.innerHTML = svg;
}

function renderTimelineMobile(){
  const wrap = document.getElementById("timelineMobileWrap");
  if(!wrap) return;

  const {characters, years} = currentTimelineData();

  if(!timelineCharacters.length){
    wrap.innerHTML = '<div class="timeline-empty-message">年齢が登録されているキャラクターがまだいません。</div>';
    return;
  }

  if(!characters.length){
    wrap.innerHTML = '<div class="timeline-empty-message">表示するキャラクターを選んでください。</div>';
    return;
  }

  if(!years.length){
    wrap.innerHTML = '<div class="timeline-empty-message">表示できる出来事がありません。「すべての年を表示」に戻して入力してください。</div>';
    return;
  }

  const mobileYears = [];

  years.forEach(year => {
    const cells = characters.map(character => {
      const color = characterColor(character);
      const text = timelineEntries?.[character.id]?.[year] || "";
      const updatedAt = timelineEntryMeta?.[character.id]?.[year] || "";
      const hasText = !!text.trim();
      const unborn = Number(character.currentAge) - Number(year) < 0;
      const placeholder = unborn ? "未出生" : "この時期の出来事";
      const unbornClass = unborn && !hasText ? "unborn-empty" : "";
      const emptyClass = !hasText ? "empty" : "";

      if(hideMobileEmptyCharacters && !hasText){
        return "";
      }

      if(timelineEditMode){
        return `
          <div class="timeline-mobile-cell ${unbornClass}" style="--c:${color}">
            <div class="timeline-mobile-character">
              ${characterFace(character)}
              <span>${e(character.name || "名前未設定")}</span>
              <span class="timeline-mobile-age">${e(ageLabel(character, year))}</span>
            </div>
            <textarea
              data-character="${e(character.id)}"
              data-years-ago="${year}"
              data-original="${c(text)}"
              data-updated-at="${e(updatedAt)}"
              oninput="markTimelineChanged(this)"
              placeholder="${e(placeholder)}">${e(text)}</textarea>
          </div>
        `;
      }

      return `
        <div class="timeline-mobile-cell ${unbornClass}" style="--c:${color}">
          <div class="timeline-mobile-character">
            ${characterFace(character)}
            <span>${e(character.name || "名前未設定")}</span>
            <span class="timeline-mobile-age">${e(ageLabel(character, year))}</span>
          </div>
          <div class="timeline-mobile-text ${emptyClass}">${hasText ? e(text) : e(placeholder)}</div>
        </div>
      `;
    }).filter(Boolean).join("");

    if(cells || !hideMobileEmptyCharacters){
      mobileYears.push(`
        <section class="timeline-mobile-year">
          <div class="timeline-mobile-year-title">${e(yearLabel(year))}</div>
          ${cells || '<div class="timeline-empty-message">表示できる出来事がありません。</div>'}
        </section>
      `);
    }
  });

  wrap.innerHTML = mobileYears.length
    ? mobileYears.join("")
    : '<div class="timeline-empty-message">表示できる出来事がありません。「未記入キャラも表示」に戻してください。</div>';
}

function enterTimelineEditMode(){
  timelineEditMode = true;
  const editButton = document.getElementById("timelineEditButton");
  const saveButton = document.getElementById("timelineSaveButton");
  const hint = document.getElementById("timelineSaveHint");
  if(editButton) editButton.style.display = "none";
  if(saveButton) saveButton.style.display = "";
  if(hint) hint.textContent = "編集モードです。入力後は保存してください。";
  renderTimelineViews();
}

function leaveTimelineEditMode(render = true){
  timelineEditMode = false;
  const editButton = document.getElementById("timelineEditButton");
  const saveButton = document.getElementById("timelineSaveButton");
  const hint = document.getElementById("timelineSaveHint");
  if(editButton) editButton.style.display = "";
  if(saveButton) saveButton.style.display = "none";
  if(hint) hint.textContent = "閲覧モードです。編集する時は「編集する」を押してください。";
  if(render) renderTimelineViews();
}

function markTimelineChanged(textarea){
  const characterId = textarea.dataset.character;
  const yearsAgo = Number(textarea.dataset.yearsAgo);
  const key = timelineKey(characterId, yearsAgo);

  textarea.dataset.dirty = "1";
  timelineDirtyKeys.add(key);

  if(!timelineEntries[characterId]) timelineEntries[characterId] = {};
  timelineEntries[characterId][yearsAgo] = textarea.value.trim();

  setUnsavedChanges(true);
  showTimelineMessage("未保存の変更があります");
}

function collectTimelineEntries(){
  const map = new Map();

  document.querySelectorAll("textarea[data-character][data-years-ago]").forEach(textarea => {
    const characterId = textarea.dataset.character;
    const yearsAgo = Number(textarea.dataset.yearsAgo);
    const key = timelineKey(characterId, yearsAgo);

    if(!timelineDirtyKeys.has(key) && textarea.dataset.dirty !== "1") return;
    if(!characterId || !Number.isFinite(yearsAgo)) return;

    map.set(key, {
      character_id: characterId,
      years_ago: yearsAgo,
      text: textarea.value.trim(),
      original_updated_at: textarea.dataset.updatedAt || "",
      updated_at: new Date().toISOString()
    });
  });

  return [...map.values()];
}

async function assertTimelineUnchanged(rows){
  for(const row of rows){
    const {data, error} = await sb
      .from("timeline_entries")
      .select("updated_at")
      .eq("character_id", row.character_id)
      .eq("years_ago", row.years_ago)
      .maybeSingle();

    if(error) throw error;

    const known = row.original_updated_at || "";
    const current = data?.updated_at || "";

    if(known && current && !sameTimestamp(current, known)){
      throw new Error("他の人が同じ時系列セルを先に更新しています。上書きを防ぐため保存を止めました。ページを再読み込みしてください。");
    }
    if(!known && current){
      throw new Error("他の人が同じ時系列セルを先に作成しています。上書きを防ぐため保存を止めました。ページを再読み込みしてください。");
    }
  }
}

async function saveTimeline(){
  showTimelineMessage("保存中...");
  const rows = collectTimelineEntries();

  if(rows.length === 0){
    showTimelineMessage("保存する変更がありません");
    leaveTimelineEditMode();
    return;
  }

  try{
    await assertTimelineUnchanged(rows);
  }catch(error){
    console.error(error);
    showTimelineMessage(error.message);
    alert(error.message);
    return;
  }

  for(const sourceRow of rows){
    const {original_updated_at, ...row} = sourceRow;

    const existing = await sb
      .from("timeline_entries")
      .select("character_id,years_ago")
      .eq("character_id", row.character_id)
      .eq("years_ago", row.years_ago)
      .maybeSingle();

    if(existing.error){
      showTimelineMessage("保存確認に失敗しました：" + existing.error.message);
      return;
    }

    let result;
    if(existing.data){
      result = await sb
        .from("timeline_entries")
        .update({ text: row.text, updated_at: row.updated_at })
        .eq("character_id", row.character_id)
        .eq("years_ago", row.years_ago);
    }else{
      result = await sb
        .from("timeline_entries")
        .insert(row);
    }

    if(result.error){
      showTimelineMessage("保存に失敗しました：" + result.error.message);
      return;
    }
  }

  showTimelineMessage("保存しました");
  clearUnsavedChanges();
  timelineEditMode = false;
  await loadTimeline();
}

loadTimeline().catch(error => {
  console.error(error);
  showTimelineMessage("読み込みに失敗しました：" + error.message);
});
</script>
