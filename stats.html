<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ステータス</title>
  <link rel="stylesheet" href="./style.css?v=162">
  <style>
    .stats-controls{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      align-items:end;
      margin:14px 0 16px;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.9);
    }
    .stats-controls label{display:block;color:var(--sub);font-size:12px;font-weight:bold;margin-bottom:5px}
    .stats-checks{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding-bottom:4px}
    .stats-checks label{display:flex;gap:6px;align-items:center;margin:0;color:var(--text);font-size:13px}
    .stat-high{background:rgba(255,193,7,.18)!important;font-weight:900;color:#8a5d00}
    .stat-low{background:rgba(137,195,235,.18)!important;color:#23617d}
    .stat-sort-note{color:var(--muted);font-size:12px;margin-top:6px}
    .ranking-box{margin-top:18px;padding:14px;border-radius:18px;background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.9)}
    .ranking-controls{display:grid;grid-template-columns:minmax(180px,280px) minmax(120px,160px) 1fr;gap:12px;align-items:end;margin-top:12px}
    .ranking-list{display:grid;gap:8px;margin-top:14px}
    .ranking-item{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;padding:9px 12px;border-radius:14px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.95)}
    .ranking-place{font-weight:900;color:var(--sub)}
    .ranking-name{display:flex;align-items:center;gap:8px;font-weight:900}
    .ranking-value{font-weight:900;font-size:18px}
    @media(max-width:760px){.ranking-controls{grid-template-columns:1fr}.ranking-item{grid-template-columns:34px 1fr auto;padding:9px}}
    @media(max-width:760px){.stats-controls{grid-template-columns:1fr}.stats-checks{display:grid;gap:8px}}
  
/* v150 stats mobile control fix */
@media(max-width:760px){
  .stats-controls,
  .stats-options,
  .stats-filter,
  .status-controls,
  .status-options,
  .status-filter,
  .stats-checks,
  .status-checks{
    writing-mode:horizontal-tb!important;
    text-orientation:mixed!important;
  }
  .stats-controls label,
  .stats-options label,
  .stats-filter label,
  .status-controls label,
  .status-options label,
  .status-filter label,
  .stats-checks label,
  .status-checks label,
  .character-toggle,
  .stat-toggle,
  label:has(input[type="checkbox"]){
    writing-mode:horizontal-tb!important;
    text-orientation:mixed!important;
    display:flex!important;
    flex-direction:row!important;
    align-items:center!important;
    gap:10px!important;
    min-height:auto!important;
    width:auto!important;
    max-width:100%!important;
    white-space:normal!important;
    line-height:1.45!important;
  }
  .stats-controls input[type="checkbox"],
  .stats-options input[type="checkbox"],
  .stats-filter input[type="checkbox"],
  .status-controls input[type="checkbox"],
  .status-options input[type="checkbox"],
  .status-filter input[type="checkbox"],
  .stats-checks input[type="checkbox"],
  .status-checks input[type="checkbox"],
  input[type="checkbox"]{
    width:22px!important;
    height:22px!important;
    min-width:22px!important;
    min-height:22px!important;
    max-width:22px!important;
    max-height:22px!important;
    inline-size:22px!important;
    block-size:22px!important;
    flex:0 0 22px!important;
    transform:none!important;
    writing-mode:horizontal-tb!important;
    appearance:auto;
    -webkit-appearance:checkbox;
  }
  .stats-list,
  .stats-grid,
  .status-list,
  .status-grid{
    writing-mode:horizontal-tb!important;
    text-orientation:mixed!important;
  }
}


/* v151 stronger stats mobile checkbox fix */
@media(max-width:760px){
  .panel:has(input[type="checkbox"]),
  .panel:has(input[type="checkbox"]) *{
    writing-mode:horizontal-tb!important;
    text-orientation:mixed!important;
  }
  .panel label:has(input[type="checkbox"]),
  label:has(input[type="checkbox"]),
  .character-toggle,
  .stat-toggle{
    display:flex!important;
    flex-direction:row!important;
    align-items:center!important;
    justify-content:flex-start!important;
    gap:10px!important;
    min-height:auto!important;
    height:auto!important;
    width:auto!important;
    max-width:100%!important;
    white-space:normal!important;
    line-height:1.45!important;
  }
  input[type="checkbox"]{
    width:22px!important;
    height:22px!important;
    min-width:22px!important;
    min-height:22px!important;
    max-width:22px!important;
    max-height:22px!important;
    inline-size:22px!important;
    block-size:22px!important;
    flex:0 0 22px!important;
    transform:none!important;
    writing-mode:horizontal-tb!important;
    appearance:auto!important;
    -webkit-appearance:checkbox!important;
  }
}


/* v152 mobile stats checkbox fix */
@media(max-width:760px){
  .panel:has(input[type="checkbox"]),
  .panel:has(input[type="checkbox"]) *{
    writing-mode:horizontal-tb!important;
    text-orientation:mixed!important;
  }
  .panel label:has(input[type="checkbox"]),
  label:has(input[type="checkbox"]),
  .character-toggle,
  .stat-toggle{
    display:flex!important;
    flex-direction:row!important;
    align-items:center!important;
    justify-content:flex-start!important;
    gap:10px!important;
    min-height:auto!important;
    height:auto!important;
    width:auto!important;
    max-width:100%!important;
    white-space:normal!important;
    line-height:1.45!important;
  }
  input[type="checkbox"]{
    width:22px!important;
    height:22px!important;
    min-width:22px!important;
    min-height:22px!important;
    max-width:22px!important;
    max-height:22px!important;
    inline-size:22px!important;
    block-size:22px!important;
    flex:0 0 22px!important;
    transform:none!important;

    appearance:auto!important;
    -webkit-appearance:checkbox!important;
  }
}

</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div>
      <div class="header-buttons">
        <a class="header-button" href="./index.html">キャラクター</a>
        <a class="header-button" href="./compare.html">キャラQ&A</a>
        <a class="header-button" href="./timeline.html">時系列</a>
        <a class="header-button" href="./relationship.html">相関図</a>
      </div>
    </div>
  </header>
  <main>
    <section class="panel">
      <div class="page-title-row"><h2>ステータス</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="ステータスの説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>ステータス比較</b>初期状態では全員選択済みです。チェックを外すと比較対象から外せます。</span></span></div>
      <div class="layout-two" style="margin-top:16px"><div class="compare-list" id="checks"></div><div class="chart-box"><canvas id="cv" width="620" height="520"></canvas></div></div>
      <div class="ranking-box">
        <div class="page-title-row"><h2>各ステータスランキング</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="ランキングの説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>ランキング</b>選んだステータスや技能ごとに、キャラクターの順位を確認できます。</span></span></div>
        <div class="ranking-controls">
          <div><label for="rankingKey">項目</label><select id="rankingKey" onchange="renderRanking()"></select></div>
          <div><label for="rankingDir">順番</label><select id="rankingDir" onchange="renderRanking()"><option value="desc">高い順</option><option value="asc">低い順</option></select></div>
          
        </div>
        <div id="rankingList" class="ranking-list"></div>
      </div>
    </section>

    <section class="panel">
      <div class="page-title-row"><h2>ステータス一覧</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="ステータス一覧の説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>技能一覧</b>キャラクターごとのステータス・技能値を表で確認できます。一番高い値/低い値の色付け、全員初期値の技能の非表示ができます。</span></span></div>

      <div class="stats-controls">
        <div class="stats-checks">
          <label><input id="highlightExtremes" type="checkbox" checked onchange="renderTable()"> 一番高い/低い値に色をつける</label>
          <label><input id="hideDefaults" type="checkbox" onchange="renderTable()"> 全員初期値の技能を隠す</label>
        </div>
      </div>

      <div class="table-wrap" id="tw"><p class="note">読み込み中...</p></div><div id="mobileStats" class="mobile-stats-list"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=162"></script>
  <script src="./common.js?v=162"></script>
  <script>initSiteTitle();</script>
  <script>
    const STATUS_MAX = 20;
    let CH = [];
    let SM = {};

    async function init(){
      const t = await team();
      const [cr, sr] = await Promise.all([
        sb.from('characters').select('id,name,furigana,emoji,icon_url,image_color,basic,answers,created_at,sort_order').eq('team_id',t.id).order('sort_order',{ascending:true,nullsFirst:false}).order('created_at',{ascending:true}),
        sb.from('stats').select('*')
      ]);
      if(cr.error) throw cr.error;
      if(sr.error) throw sr.error;
      CH = sortedCharacters(cr.data || []);
      SM = {};
      (sr.data || []).forEach(x => SM[x.character_id] = x.values || {});
      renderRankingOptions();
      renderChecks();
      renderTable();
      draw();
      renderRanking();
    }

    function allKeys(){ return SG.flatMap(g => g.keys); }

    function renderRankingOptions(){
      const extra = `<optgroup label="キャラ基本情報"><option value="年齢">年齢</option><option value="身長">身長</option></optgroup>`;
      const options = extra + SG.map(g => `<optgroup label="${e(g.title)}">${g.keys.map(k => `<option value="${e(k)}">${e(k)}</option>`).join('')}</optgroup>`).join('');
      rankingKey.innerHTML = options;
      if([...rankingKey.options].some(o => o.value === 'STR')) rankingKey.value = 'STR';
    }

    function renderChecks(){
      if(!CH.length){ checks.innerHTML='<p class="note">キャラクターがありません。</p>'; return; }
      checks.innerHTML = CH.map(ch => {
        const cc = col(ch.image_color), em = firstEmoji(ch.emoji);
        return `<label class="compare-item"><input type="checkbox" value="${c(ch.id)}" checked onchange="draw()"><span class="mini-emoji" style="--c:${cc}">${e(em)}</span><span style="color:${cc};font-weight:bold">${e(ch.name||'名前未設定')}</span></label>`;
      }).join('');
    }

    function numericValue(v){
      const raw = String(v ?? '').trim();
      if(!raw) return NaN;
      const m = raw.match(/-?\d+(?:\.\d+)?/);
      return m ? Number(m[0]) : NaN;
    }
    function num(v){ const n = numericValue(v); return Number.isFinite(n) ? n : 0; }
    function displayValue(id,k){
      const ch = CH.find(c=>c.id===id);
      if(k==='年齢') return ch?.basic?.age || '';
      if(k==='身長') return ch?.answers?.height || '';
      const v = SM[id]?.[k];
      if(v !== undefined && v !== null && String(v).trim() !== '') return String(v);
      const d = statDefault(k);
      return d !== undefined && d !== null && String(d).trim() !== '' ? String(d) : '';
    }
    function isDefaultRow(k, chars){
      const d = String(statDefault(k) ?? '').trim();
      return chars.every(ch => String(SM[ch.id]?.[k] ?? '').trim() === '' || String(SM[ch.id]?.[k] ?? '').trim() === d);
    }
    function sortedForTable(){
      return CH.slice();
    }

    function draw(){
      const canvas = cv, ctx = canvas.getContext('2d'), w = canvas.width, h = canvas.height, cx = w/2, cy = h/2+12, r = 180;
      ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); grid(ctx,cx,cy,r);
      [...document.querySelectorAll('#checks input:checked')].map(x=>x.value).forEach((id,i)=>{
        const ch = CH.find(x=>x.id===id); if(!ch) return;
        const vals = AB.map(k=>num(SM[id]?.[k]));
        line(ctx,cx,cy,r,vals,col(ch.image_color)); legend(ctx,ch,col(ch.image_color),i);
      });
    }
    function ang(i){return -Math.PI/2+Math.PI*2*i/AB.length}
    function poly(ctx,cx,cy,r){ctx.beginPath();AB.forEach((_,i)=>{let a=ang(i),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.closePath();ctx.stroke()}
    function grid(ctx,cx,cy,r){ctx.strokeStyle='#d8d8dc';ctx.fillStyle='#666';ctx.lineWidth=1;ctx.font='12px sans-serif';for(let l=1;l<=5;l++){poly(ctx,cx,cy,r*l/5);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(String(l*4),cx+6,cy-r*l/5)}AB.forEach((k,i)=>{let a=ang(i),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();let lx=cx+Math.cos(a)*(r+30),ly=cy+Math.sin(a)*(r+30);ctx.textAlign=lx<cx-10?'right':lx>cx+10?'left':'center';ctx.textBaseline=ly<cy?'bottom':'top';ctx.fillText(k,lx,ly)})}
    function line(ctx,cx,cy,r,vals,color){ctx.beginPath();vals.forEach((v,i)=>{let sv=Math.max(0,Math.min(STATUS_MAX,Number(v||0)));let a=ang(i),rr=r*sv/STATUS_MAX,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.closePath();let R=rgb(color)||{r:153,g:153,b:153};ctx.fillStyle=`rgba(${R.r},${R.g},${R.b},0.14)`;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.fill();ctx.stroke()}
    function legend(ctx,ch,color,i){let x=24,y=24+i*22;ctx.fillStyle=color;ctx.fillRect(x,y-10,12,12);ctx.fillStyle='#222';ctx.font='13px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(ch.name||'名前未設定',x+18,y-4)}

    function cellClass(k, ch, chars){
      if(!highlightExtremes.checked) return '';
      const nums = chars.map(ca => ({id:ca.id, n:numericValue(displayValue(ca.id,k))})).filter(x => Number.isFinite(x.n));
      if(nums.length < 2) return '';
      const max = Math.max(...nums.map(x=>x.n));
      const min = Math.min(...nums.map(x=>x.n));
      if(max === min) return '';
      const n = numericValue(displayValue(ch.id,k));
      if(!Number.isFinite(n)) return '';
      if(n === max) return ' class="stat-high" title="この項目で一番高い値"';
      if(n === min) return ' class="stat-low" title="この項目で一番低い値"';
      return '';
    }

    function renderRanking(){
      if(!CH.length || !rankingKey) return;
      const key = rankingKey.value || 'STR';
      const dir = rankingDir.value === 'asc' ? 1 : -1;
      const rows = CH.map(ch => ({
        ch,
        raw: displayValue(ch.id, key),
        n: numericValue(displayValue(ch.id, key))
      })).filter(x => Number.isFinite(x.n));
      rows.sort((a,b) => a.n === b.n ? String(a.ch.name||'').localeCompare(String(b.ch.name||''),'ja') : (a.n - b.n) * dir);
      if(!rows.length){
        rankingList.innerHTML = '<p class="note">この項目に数値が入っているキャラクターがいません。</p>';
        return;
      }
      rankingList.innerHTML = rows.map((row,i) => {
        const cc = col(row.ch.image_color), em = firstEmoji(row.ch.emoji);
        return `<div class="ranking-item" style="border-left:6px solid ${cc};background:${soft(cc)}"><div class="ranking-place">${i+1}位</div><div class="ranking-name"><span class="mini-emoji" style="--c:${cc}">${e(em)}</span><span>${e(row.ch.name||'名前未設定')}</span></div><div class="ranking-value">${e(row.raw)}</div></div>`;
      }).join('');
    }

    function renderTable(){
      if(!CH.length){ tw.innerHTML='<p class="note">キャラクターがありません。</p>'; return; }
      const chars = sortedForTable();
      const head = `<thead><tr><th class="sticky-col">項目</th>${chars.map(ch=>{let cc=col(ch.image_color),em=firstEmoji(ch.emoji);return `<th class="character-col"><span style="color:${cc};font-weight:bold">${e(ch.name||'名前未設定')}</span> <span>${e(em)}</span></th>`}).join('')}</tr></thead>`;
      const displayGroups = [{title:'キャラ基本情報',keys:['年齢','身長']}, ...SG];
      const body = displayGroups.map(g => {
        const keys = g.keys.filter(k => !(hideDefaults.checked && isDefaultRow(k, chars)));
        if(!keys.length) return '';
        return `<tr class="group-row"><th class="sticky-col">${e(g.title)}</th>${chars.map(()=>'<td></td>').join('')}</tr>` + keys.map(k => {
          return `<tr><th class="sticky-col">${e(k)}</th>${chars.map(ch => {
            const val = displayValue(ch.id,k) || '—';
            return `<td${cellClass(k,ch,chars)}>${e(val)}</td>`;
          }).join('')}</tr>`;
        }).join('');
      }).join('');
      tw.innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;
      renderMobileStats(chars, displayGroups);
    }

    function renderMobileStats(chars, displayGroups){
      if(!mobileStats) return;
      if(!chars.length){ mobileStats.innerHTML='<p class="note">キャラクターがありません。</p>'; return; }
      mobileStats.innerHTML = displayGroups.map(g => {
        const keys = g.keys.filter(k => !(hideDefaults.checked && isDefaultRow(k, chars)));
        if(!keys.length) return '';
        return `<section class="mobile-stat-group"><h3>${e(g.title)}</h3>${keys.map(k=>`<article class="mobile-stat-card"><div class="mobile-stat-title">${e(k)}</div><div class="mobile-stat-values">${chars.map(ch=>{const cc=col(ch.image_color), em=firstEmoji(ch.emoji), val=displayValue(ch.id,k)||'—'; const cls=cellClass(k,ch,chars).match(/class="([^"]+)/)?.[1]||''; return `<div class="mobile-stat-value ${cls}" style="--c:${cc}"><span class="mobile-stat-name"><span class="mini-emoji" style="--c:${cc}">${e(em)}</span>${e(ch.name||'名前未設定')}</span><span class="mobile-stat-number">${e(val)}</span></div>`}).join('')}</div></article>`).join('')}</section>`;
      }).join('');
    }

    init().catch(x => tw.innerHTML='<p class="note">読み込み失敗：'+e(x.message)+'</p>');
  </script>
</body>
</html>
