<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ステータス</title><link rel="stylesheet" href="./style.css?v=120"></head><body><header><div class="header-inner"><div><h1 class="site-brand" id="siteTitle">自陣キャラ図鑑</h1></div><div class="header-buttons"><a class="header-button" href="./index.html">キャラクター</a><a class="header-button" href="./compare.html">質問</a><a class="header-button" href="./timeline.html">時系列</a><a class="header-button" href="./relationship.html">相関図</a></div></div></header><main><section class="panel"><div class="page-title-row"><h2>ステータス</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="ステータスの説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>ステータス比較</b>キャラクター追加・編集で入力したSTR〜EDUを、20を最大値にした八角形グラフで比較します。チェックを外すと比較対象から外せます。</span></span></div><div class="layout-two" style="margin-top:16px"><div class="compare-list" id="checks"></div><div class="chart-box"><canvas id="cv" width="620" height="520"></canvas></div></div></section><section class="panel"><div class="page-title-row"><h2>ステータス一覧</h2><span class="info-wrap"><button class="info-button" type="button" aria-label="ステータス一覧の説明"><svg class="info-svg" viewBox="0 0 1200 1200" aria-hidden="true" focusable="false"><path d="M600 20C279.7 20 20 279.7 20 600s259.7 580 580 580 580-259.7 580-580S920.3 20 600 20zm0 70c281.6 0 510 228.4 510 510s-228.4 510-510 510S90 881.6 90 600 318.4 90 600 90z"/><circle cx="600" cy="285" r="100"/><rect x="500" y="430" width="200" height="520" rx="95"/></svg></button><span class="info-pop"><b>技能一覧</b>キャラクターごとのステータス・技能値を表で確認できます。入力はキャラクターページの追加・編集フォームから行います。</span></span></div><div class="table-wrap" id="tw"><p class="note">読み込み中...</p></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script src="./common.js"></script>
  <script>initSiteTitle();</script><script>const STATUS_MAX=20;let CH=[],SM={};async function init(){let t=await team();let [cr,sr]=await Promise.all([sb.from('characters').select('id,name,furigana,emoji,image_color,created_at').eq('team_id',t.id).order('created_at',{ascending:false}),sb.from('stats').select('*')]);if(cr.error)throw cr.error;if(sr.error)throw sr.error;CH=cr.data||[];(sr.data||[]).forEach(x=>SM[x.character_id]=x.values||{});renderChecks();renderTable();draw()}function renderChecks(){if(!CH.length){checks.innerHTML='<p class="note">キャラクターがありません。</p>';return}checks.innerHTML=CH.map((ch,i)=>{let cc=col(ch.image_color),em=ch.emoji||'👤';return`<label class="compare-item"><input type="checkbox" value="${c(ch.id)}" ${i<3?'checked':''} onchange="draw()"><span class="mini-emoji" style="--c:${cc}">${e(em)}</span><span style="color:${cc};font-weight:bold">${e(ch.name||'名前未設定')}</span></label>`}).join('')}function draw(){let canvas=cv,ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,cx=w/2,cy=h/2+12,r=180;ctx.clearRect(0,0,w,h);ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);grid(ctx,cx,cy,r);[...document.querySelectorAll('#checks input:checked')].map(x=>x.value).forEach((id,i)=>{let ch=CH.find(x=>x.id===id);if(!ch)return;let vals=AB.map(k=>Number(SM[id]?.[k]||0));line(ctx,cx,cy,r,vals,col(ch.image_color));legend(ctx,ch,col(ch.image_color),i)})}function ang(i){return-Math.PI/2+Math.PI*2*i/AB.length}function poly(ctx,cx,cy,r){ctx.beginPath();AB.forEach((_,i)=>{let a=ang(i),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.closePath();ctx.stroke()}function grid(ctx,cx,cy,r){ctx.strokeStyle='#d8d8dc';ctx.fillStyle='#666';ctx.lineWidth=1;ctx.font='12px sans-serif';for(let l=1;l<=5;l++){poly(ctx,cx,cy,r*l/5);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(String(l*4),cx+6,cy-r*l/5)}AB.forEach((k,i)=>{let a=ang(i),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();let lx=cx+Math.cos(a)*(r+30),ly=cy+Math.sin(a)*(r+30);ctx.textAlign=lx<cx-10?'right':lx>cx+10?'left':'center';ctx.textBaseline=ly<cy?'bottom':'top';ctx.fillText(k,lx,ly)})}function line(ctx,cx,cy,r,vals,color){ctx.beginPath();vals.forEach((v,i)=>{let num=Number(v||0),sv=Math.max(0,Math.min(STATUS_MAX,num));let a=ang(i),rr=r*sv/STATUS_MAX,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.closePath();let R=rgb(color)||{r:153,g:153,b:153};ctx.fillStyle=`rgba(${R.r},${R.g},${R.b},0.14)`;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.fill();ctx.stroke()}function legend(ctx,ch,color,i){let x=24,y=24+i*22;ctx.fillStyle=color;ctx.fillRect(x,y-10,12,12);ctx.fillStyle='#222';ctx.font='13px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(ch.name||'名前未設定',x+18,y-4)}function renderTable(){if(!CH.length){tw.innerHTML='<p class="note">キャラクターがありません。</p>';return}let head=`<thead><tr><th class="sticky-col">項目</th>${CH.map(ch=>{let cc=col(ch.image_color),em=ch.emoji||'👤';return`<th class="character-col"><span style="color:${cc};font-weight:bold">${e(ch.name||'名前未設定')}</span> <span>${e(em)}</span></th>`}).join('')}</tr></thead>`;let rows=SG.map(g=>`<tr class="group-row"><th class="sticky-col">${e(g.title)}</th>${CH.map(()=>'<td></td>').join('')}</tr>`+g.keys.map(k=>`<tr><th class="sticky-col">${e(k)}</th>${CH.map(ch=>`<td>${e(SM[ch.id]?.[k]||'—')}</td>`).join('')}</tr>`).join('')).join('');tw.innerHTML=`<table>${head}<tbody>${rows}</tbody></table>`}init().catch(x=>tw.innerHTML='<p class="note">読み込み失敗：'+e(x.message)+'</p>')</script></body></html>
